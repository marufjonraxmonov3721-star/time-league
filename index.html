<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Assistant</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Savol yoki kalit so'zni qidiring...">
            <button id="clearSearchBtn" style="display: none;"><i class="fas fa-times"></i></button>
        </div>

        <div class="filter-container">
            <div class="filter-group">
                <label for="subjectSelect"><i class="fas fa-book"></i> Fan:</label>
                <select id="subjectSelect">
                    </select>
            </div>
            <div class="filter-group">
                <label for="statusSelect"><i class="fas fa-filter"></i> Holat:</label>
                <select id="statusSelect">
                    <option value="all">Barchasi</option>
                    <option value="active">Tasdiqlangan</option>
                    <option value="pending">Kutilmoqda</option>
                </select>
            </div>
        </div>

        <div class="stats-panel" id="statsPanel">
            <div class="stat-card">
                <div class="stat-value" id="totalQuestionsCount">0</div>
                <div class="stat-label">Umumiy savollar</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="filteredQuestionsCount">0</div>
                <div class="stat-label">Topilgan savollar</div>
            </div>
        </div>

        <div id="questionsContainer">
            <div class="loading-spinner">
                <i class="fas fa-spinner fa-spin"></i> Ma'lumotlar yuklanmoqda...
            </div>
        </div>
    </div>

    <button class="admin-toggle-btn" id="adminToggleBtn" style="display: none;">
        <i class="fas fa-cog"></i> Admin Panel
    </button>

    <div class="admin-modal" id="adminModal">
        <div class="admin-modal-content">
            <div class="admin-modal-header">
                <h3><i class="fas fa-user-shield"></i> Admin Panel</h3>
                <button class="close-modal-btn" id="closeAdminModalBtn">&times;</button>
            </div>
            <div class="admin-modal-body">
                <div class="admin-section">
                    <h4><i class="fas fa-folder-plus"></i> Yangi Fan Qo'shish</h4>
                    <div class="form-group inline-form">
                        <input type="text" id="newSubjectInput" placeholder="Fan nomini kiriting (Masalan: Fizika)">
                        <button class="btn btn-success" id="addSubjectBtn"><i class="fas fa-plus"></i> Qo'shish</button>
                    </div>
                </div>

                <div class="admin-section">
                    <h4><i class="fas fa-plus-circle"></i> Yangi Savol Qo'shish</h4>
                    <div class="form-group">
                        <label for="addQuestionSubject">Fanni tanlang:</label>
                        <select id="addQuestionSubject">
                            </select>
                    </div>
                    <div class="form-group">
                        <label for="addQuestionText">Savol matni:</label>
                        <textarea id="addQuestionText" rows="3" placeholder="Savolni to'liq kiriting..."></textarea>
                    </div>
                    
                    <div class="options-grid">
                        <div class="form-group">
                            <label class="correct-radio-label">
                                <input type="radio" name="correctOption" value="A" checked>
                                <span>A variant (To'g'ri javob):</span>
                            </label>
                            <input type="text" id="optionA" placeholder="A variantni kiriting">
                        </div>
                        <div class="form-group">
                            <label class="correct-radio-label">
                                <input type="radio" name="correctOption" value="B">
                                <span>B variant:</span>
                            </label>
                            <input type="text" id="optionB" placeholder="B variantni kiriting">
                        </div>
                        <div class="form-group">
                            <label class="correct-radio-label">
                                <input type="radio" name="correctOption" value="C">
                                <span>C variant:</span>
                            </label>
                            <input type="text" id="optionC" placeholder="C variantni kiriting">
                        </div>
                        <div class="form-group">
                            <label class="correct-radio-label">
                                <input type="radio" name="correctOption" value="D">
                                <span>D variant:</span>
                            </label>
                            <input type="text" id="optionD" placeholder="D variantni kiriting">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 15px;">
                        <label for="addQuestionExplanation">Tushuntirish / Izoh (Majburiy emas):</label>
                        <textarea id="addQuestionExplanation" rows="2" placeholder="Agar javobga izoh bo'lsa kiriting..."></textarea>
                    </div>

                    <button class="btn btn-primary btn-block" id="saveQuestionBtn" style="margin-top: 15px;">
                        <i class="fas fa-save"></i> Savolni Bazaga Saqlash
                    </button>
                </div>

                <div class="admin-section" id="pendingQuestionsSection" style="display: none;">
                    <h4><i class="fas fa-clock"></i> Tasdiqlash kutilayotgan savollar (<span id="pendingCountBadge">0</span>)</h4>
                    <div id="pendingQuestionsContainer">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="app.js"></script>
</body>
</html>

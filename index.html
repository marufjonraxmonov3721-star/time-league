<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Prep Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* Tim qora (OLED) dizayn */
        :root {
            --bg-color: #000000;
            --secondary-bg: #121212;
            --text-color: #ffffff;
            --hint-color: #aaaaaa;
            --accent-color: #0088cc; /* Telegram ko'k rangi */
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --card-border: #222222;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            overflow: hidden; /* Sahifa skroll bo'lmasligi uchun */
        }

        /* Header */
        .header {
            background-color: var(--secondary-bg);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
            color: var(--accent-color);
        }

        /* Fan tanlash tugmalari */
        .nav-tabs {
            display: flex;
            background: var(--secondary-bg);
            padding: 5px;
            gap: 5px;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--hint-color);
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: var(--bg-color);
            color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0,136,204,0.2);
        }

        /* Yodlash rejimi paneli */
        .study-tools {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: #080808;
            flex-wrap: wrap;
        }

        .tool-btn {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tool-btn.active-filter {
            border-color: var(--accent-color);
            background: rgba(0, 136, 204, 0.2);
        }

        /* Konteyner */
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
            height: calc(100vh - 220px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Savol kartochkasi */
        .card {
            background-color: var(--secondary-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 18px;
            width: 100%;
            animation: fadeIn 0.3s ease-in-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .q-id {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .q-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .q-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--card-border);
            display: none;
            max-height: 250px;
            object-fit: contain;
        }

        /* Javob tugmasi va qutisi */
        .show-ans-btn {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .answer-content {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background: rgba(46, 204, 113, 0.1);
            border-left: 3px solid var(--success-color);
            border-radius: 5px;
            font-size: 15px;
            color: #d1d1d1;
            max-height: 150px;
            overflow-y: auto;
        }

        /* Oson/Qiyin tugmalari */
        .tag-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .tag-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 12px;
            font-weight: bold;
            background: #000;
            color: #fff;
        }

        .tag-btn.oson.active { background: var(--success-color); border-color: var(--success-color); }
        .tag-btn.qiyin.active { background: var(--danger-color); border-color: var(--danger-color); }

        /* Navigatsiya tugmalari */
        .navigation {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            gap: 15px;
        }

        .nav-control {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .nav-control:disabled {
            background: #222;
            color: #555;
        }

        .counter {
            text-align: center;
            font-size: 12px;
            color: var(--hint-color);
            margin-bottom: 10px;
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: var(--hint-color);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📚 Imtihon Bazasi</h1>
</div>

<div class="nav-tabs">
    <button class="nav-btn active" onclick="changeTab(this, 'fizika_savollari')">Fizika</button>
    <button class="nav-btn" onclick="changeTab(this, 'Issiqlik_texnikasi')">Issiqlik texnikasi</button>
</div>

<div class="study-tools">
    <button class="tool-btn" onclick="shuffleQuestions()">🔀 Aralash</button>
    <button class="tool-btn" id="filterQiyin" onclick="toggleFilter('qiyin')">🔥 Faqat Qiyin</button>
    <button class="tool-btn" onclick="resetLearned()">🔄 Reset</button>
</div>

<div class="container" id="app">
    <div class="loader">Yuklanmoqda...</div>
</div>

<div class="navigation" id="nav-controls" style="display: none;">
    <button class="nav-control" id="prevBtn" onclick="prevQuestion()">⬅️</button>
    <button class="nav-control" id="nextBtn" onclick="nextQuestion()">➡️</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        databaseURL: "https://songlyrics-a5df9-default-rtdb.firebaseio.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8",
        measurementId: "G-7DJQEVW067"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allQuestions = [];
    let filteredQuestions = [];
    let currentIndex = 0;
    let currentFilter = 'all'; // all, qiyin

    // Savol holatlarini saqlash (localStorage)
    let questionStates = JSON.parse(localStorage.getItem('exam_states')) || {};

    function saveStates() {
        localStorage.setItem('exam_states', JSON.stringify(questionStates));
    }

    function changeTab(btn, path) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = 'all';
        document.getElementById('filterQiyin').classList.remove('active-filter');
        loadQuestions(path);
        tg.HapticFeedback.impactOccurred('light');
    }

    function loadQuestions(path) {
        const app = document.getElementById('app');
        const nav = document.getElementById('nav-controls');
        app.innerHTML = '<div class="loader">Savollar yuklanmoqda...</div>';
        nav.style.display = 'none';

        db.ref(path).once('value', (snap) => {
            const data = snap.val();
            if (!data) {
                app.innerHTML = '<div class="loader">Ma\'lumot topilmadi</div>';
                return;
            }

            allQuestions = Object.keys(data).map(key => {
                const item = data[key];
                const numericId = item.id || parseInt(key.replace(/\D/g, '')) || 0;
                const uniqueKey = path + '_' + numericId;
                return { ...item, displayId: numericId, uniqueKey: uniqueKey };
            }).sort((a, b) => a.displayId - b.displayId);

            applyFilter();
            nav.style.display = 'flex';
        });
    }

    function applyFilter() {
        if (currentFilter === 'qiyin') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'qiyin');
        } else {
            filteredQuestions = [...allQuestions];
        }

        currentIndex = 0;
        renderCurrent();
    }

    function toggleFilter(filter) {
        const btn = document.getElementById('filterQiyin');
        if (currentFilter === filter) {
            currentFilter = 'all';
            btn.classList.remove('active-filter');
        } else {
            currentFilter = filter;
            btn.classList.add('active-filter');
        }
        applyFilter();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function setTag(type) {
        const q = filteredQuestions[currentIndex];
        if (!q) return;

        if (questionStates[q.uniqueKey] === type) {
            delete questionStates[q.uniqueKey];
        } else {
            questionStates[q.uniqueKey] = type;
        }
        
        saveStates();
        renderCurrent();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function renderCurrent() {
        const app = document.getElementById('app');
        app.innerHTML = '';

        if (filteredQuestions.length === 0) {
            app.innerHTML = '<div class="loader">Bu bo\'limda savollar yo\'q</div>';
            updateNavButtons();
            return;
        }

        const q = filteredQuestions[currentIndex];
        const state = questionStates[q.uniqueKey] || '';
        const card = document.createElement('div');
        card.className = 'card';
        
        const hasImg = q.image && q.image.length > 20;
        
        card.innerHTML = `
            <div class="counter">${currentIndex + 1} / ${filteredQuestions.length}</div>
            <span class="q-id">ID: ${q.displayId}</span>
            <div class="q-text">${q.savol || "Matn yo'q"}</div>
            ${hasImg ? `<img src="${q.image}" class="q-image" style="display:block">` : ''}
            <button class="show-ans-btn" onclick="toggleAns(this)">Javobni ko'rsatish</button>
            <div class="answer-content">${q.javob || "Javob yo'q"}</div>
            <div class="tag-actions">
                <button class="tag-btn oson ${state === 'oson' ? 'active' : ''}" onclick="setTag('oson')">😊 Oson</button>
                <button class="tag-btn qiyin ${state === 'qiyin' ? 'active' : ''}" onclick="setTag('qiyin')">🔥 Qiyin</button>
            </div>
        `;
        app.appendChild(card);
        updateNavButtons();
    }

    function nextQuestion() {
        if (currentIndex < filteredQuestions.length - 1) {
            currentIndex++;
            renderCurrent();
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrent();
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    function updateNavButtons() {
        document.getElementById('prevBtn').disabled = currentIndex === 0 || filteredQuestions.length === 0;
        document.getElementById('nextBtn').disabled = currentIndex === filteredQuestions.length - 1 || filteredQuestions.length === 0;
    }

    function toggleAns(btn) {
        const content = btn.nextElementSibling;
        if(content.style.display === 'block') {
            content.style.display = 'none';
            btn.innerText = 'Javobni ko\'rsatish';
        } else {
            content.style.display = 'block';
            btn.innerText = 'Yashirish';
            tg.HapticFeedback.notificationOccurred('success');
        }
    }

    function shuffleQuestions() {
        filteredQuestions.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        renderCurrent();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function resetLearned() {
        if(confirm("Barcha belgilangan (Oson/Qiyin) statuslarni o'chirib tashlaysizmi?")) {
            questionStates = {};
            saveStates();
            renderCurrent();
            tg.HapticFeedback.notificationOccurred('warning');
        }
    }

    loadQuestions('fizika_savollari');
</script>
</body>
</html>

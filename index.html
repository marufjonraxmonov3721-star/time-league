<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Prep Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* Modern Minimalist OLED Design */
        :root {
            --bg-color: #000000;
            --secondary-bg: #0a0a0a;
            --card-bg: #111111;
            --text-color: #ffffff;
            --hint-color: #888888;
            --accent-color: #0088cc;
            --success-color: #00c853;
            --danger-color: #ff3d00;
            --learned-color: #9b59b6;
            --border-color: #1a1a1a;
            --glass-bg: rgba(20, 20, 20, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            overflow: hidden;
            letter-spacing: -0.02em;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: 700;
            color: var(--text-color);
            padding-left: 10px;
        }

        .stats-badge {
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .reset-all-btn {
            background: none;
            border: 1px solid #333;
            color: #ff4444;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
        }

        /* Nav Tabs */
        .nav-tabs {
            display: flex;
            background: var(--secondary-bg);
            padding: 6px;
            margin: 10px 15px 5px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            gap: 4px;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--hint-color);
            padding: 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .nav-btn.active {
            background: #1a1a1a;
            color: var(--accent-color);
        }

        /* Matrix Container */
        .matrix-container {
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .matrix-item {
            min-width: 35px;
            height: 35px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }

        .matrix-item.active { border-color: var(--accent-color); color: #fff; transform: scale(1.1); }
        .matrix-item.oson { background: var(--success-color); color: #fff; border: none; }
        .matrix-item.qiyin { background: var(--danger-color); color: #fff; border: none; }
        .matrix-item.ready { background: var(--learned-color); color: #fff; border: none; }

        /* Study Tools */
        .study-tools {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px 15px 10px;
            flex-shrink: 0;
        }

        .tool-btn {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            color: var(--hint-color);
            padding: 8px 5px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .tool-btn b { color: #fff; margin-left: 3px; }

        .tool-btn.active-filter {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(0, 136, 204, 0.05);
        }

        /* Main Container */
        .container {
            padding: 5px 20px;
            max-width: 600px;
            margin: 0 auto;
            flex-grow: 1;
            overflow-y: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        /* Card */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
            margin-bottom: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-id {
            color: var(--accent-color);
            font-weight: 800;
            font-size: 12px;
            margin-bottom: 8px;
            display: block;
        }

        .q-text {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .q-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            display: none;
            max-height: 220px;
            object-fit: contain;
        }

        /* ChatGPT Style Answer Formatting */
        .ans-container {
            color: #e0e0e0;
            font-size: 15px;
            line-height: 1.6;
        }

        .ans-header {
            font-weight: 700;
            color: #ffffff;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 16px;
            border-left: 3px solid var(--accent-color);
            padding-left: 10px;
        }

        .ans-formula {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00;
            font-size: 18px;
            text-align: center;
            border: 1px dashed #333;
        }

        .ans-list {
            margin: 5px 0;
            padding-left: 20px;
            list-style-type: disc;
        }

        .ans-list li {
            margin-bottom: 8px;
        }

        .ans-summary {
            background: rgba(0, 136, 204, 0.1);
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid rgba(0, 136, 204, 0.2);
        }

        .ans-summary b { color: var(--accent-color); }

        /* Tag Actions */
        .tag-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 25px;
        }

        .tag-btn {
            padding: 14px 2px;
            border-radius: 12px;
            border: 1px solid #222;
            font-size: 10px;
            font-weight: 700;
            background: #050505;
            color: #fff;
            transition: 0.2s;
            text-transform: uppercase;
        }

        .tag-btn.oson.active { background: var(--success-color); border-color: var(--success-color); }
        .tag-btn.qiyin.active { background: var(--danger-color); border-color: var(--danger-color); }
        .tag-btn.ready.active { background: var(--learned-color); border-color: var(--learned-color); }

        /* Real Exam Styles */
        .exam-input {
            width: 100%;
            background: #050505;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            padding: 15px;
            font-family: inherit;
            font-size: 15px;
            min-height: 120px;
            margin-top: 15px;
            resize: none;
        }
        .exam-input:focus { border-color: var(--accent-color); }
        .diff-text { white-space: pre-wrap; line-height: 1.6; }
        .diff-red { color: var(--danger-color); text-decoration: line-through; }
        .diff-green { color: var(--success-color); font-weight: bold; }
        .exam-nav { display: flex; gap: 10px; margin-top: 20px; }
        .exam-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .exam-check-btn { background: var(--accent-color); color: #fff; }
        .exam-next-btn { background: #333; color: #fff; }

        /* Canvas Table Styles */
        #examCanvas {
            background: #1a0f00; /* Wood color */
            border-radius: 15px;
            box-shadow: inset 0 0 50px #000;
            width: 100%;
            height: 350px;
            cursor: pointer;
        }
        .score-display {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            text-align: center;
            margin: 10px 0;
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: var(--hint-color);
            width: 100%;
        }
    </style>
</head>
<body>

<div class="header">
    <button class="reset-all-btn" onclick="resetLearned()">🔄</button>
    <h1>Exam Prep Pro</h1>
    <div class="stats-badge" id="totalPercent">0%</div>
</div>

<div class="nav-tabs" id="nav-tabs">
    <button class="nav-btn active" data-path="fizika_savollari" onclick="changeTab(this, 'fizika_savollari')">Fizika</button>
    <button class="nav-btn" data-path="Issiqlik_texnikasi" onclick="changeTab(this, 'Issiqlik_texnikasi')">Issiqlik</button>
    <button class="nav-btn" onclick="startExamTab(this)">🔥 Real Imtihon</button>
</div>

<div class="matrix-container" id="matrix"></div>

<div class="study-tools" id="study-tools-ui">
    <button class="tool-btn active-filter" id="filterAll" onclick="toggleFilter('all')">👁 Hammasi <b id="cntAll">0</b></button>
    <button class="tool-btn" id="filterOson" onclick="toggleFilter('oson')">✅ Yodladim <b id="cntOson">0</b></button>
    <button class="tool-btn" id="filterQiyin" onclick="toggleFilter('qiyin')">❌ Yodlamadim <b id="cntQiyin">0</b></button>
    <button class="tool-btn" id="filterReady" onclick="toggleFilter('ready')">⭐ 100% Tayyor <b id="cntReady">0</b></button>
</div>

<div class="container" id="app">
    <div class="loader">Yuklanmoqda...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        databaseURL: "https://songlyrics-a5df9-default-rtdb.firebaseio.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8",
        measurementId: "G-7DJQEVW067"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allQuestions = [];
    let filteredQuestions = [];
    let currentIndex = 0;
    let currentFilter = 'all'; 
    let currentPath = 'fizika_savollari';
    let isExamMode = false;
    let examQuestions = [];
    let examScores = [0, 0, 0];

    let questionStates = JSON.parse(localStorage.getItem('exam_states_v3')) || {};

    function saveStates() {
        localStorage.setItem('exam_states_v3', JSON.stringify(questionStates));
        updateCounts();
        renderMatrix();
    }

    function updateCounts() {
        let oson = 0, qiyin = 0, ready = 0;
        allQuestions.forEach(q => {
            const state = questionStates[q.uniqueKey];
            if(state === 'oson') oson++;
            if(state === 'qiyin') qiyin++;
            if(state === 'ready') ready++;
        });
        
        document.getElementById('cntAll').innerText = allQuestions.length;
        document.getElementById('cntOson').innerText = oson;
        document.getElementById('cntQiyin').innerText = qiyin;
        document.getElementById('cntReady').innerText = ready;

        const totalHandled = oson + qiyin + ready;
        const percent = allQuestions.length > 0 ? Math.round((totalHandled / allQuestions.length) * 100) : 0;
        document.getElementById('totalPercent').innerText = percent + '%';
    }

    function renderMatrix() {
        const matrix = document.getElementById('matrix');
        matrix.innerHTML = '';
        if(isExamMode) return; 

        allQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            const state = questionStates[q.uniqueKey] || '';
            div.className = `matrix-item ${state} ${currentIndex === idx && currentFilter === 'all' ? 'active' : ''}`;
            div.innerText = idx + 1;
            div.onclick = () => {
                if(currentFilter !== 'all') {
                    currentFilter = 'all';
                    applyFilter();
                }
                currentIndex = idx;
                renderCurrent();
                tg.HapticFeedback.impactOccurred('light');
            };
            matrix.appendChild(div);
        });

        const activeItem = matrix.children[currentIndex];
        if (activeItem) {
            activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    }

    function changeTab(btn, path) {
        isExamMode = false;
        document.getElementById('study-tools-ui').style.display = 'grid';
        document.getElementById('matrix').style.display = 'flex';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPath = path;
        currentFilter = 'all';
        loadQuestions(path);
        tg.HapticFeedback.impactOccurred('light');
    }

    function loadQuestions(path) {
        const app = document.getElementById('app');
        app.innerHTML = '<div class="loader">Yuklanmoqda...</div>';

        db.ref(path).once('value', (snap) => {
            const data = snap.val();
            if (!data) {
                app.innerHTML = '<div class="loader">Ma\'lumot topilmadi</div>';
                return;
            }

            allQuestions = Object.keys(data).map(key => {
                const item = data[key];
                const numericId = item.id || parseInt(key.replace(/\D/g, '')) || 0;
                const uniqueKey = path + '_' + numericId;
                return { ...item, displayId: numericId, uniqueKey: uniqueKey };
            }).sort((a, b) => a.displayId - b.displayId);

            applyFilter();
        });
    }

    function applyFilter() {
        if (currentFilter === 'qiyin') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'qiyin');
        } else if (currentFilter === 'oson') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'oson');
        } else if (currentFilter === 'ready') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'ready');
        } else {
            filteredQuestions = [...allQuestions];
        }

        currentIndex = 0;
        renderCurrent();
        updateFilterUI();
        updateCounts();
        renderMatrix();
    }

    function toggleFilter(filter) {
        currentFilter = filter;
        applyFilter();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateFilterUI() {
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active-filter'));
        const targetId = 'filter' + currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1);
        const btn = document.getElementById(targetId);
        if(btn) btn.classList.add('active-filter');
    }

    function formatAnswer(text) {
        if (!text) return "Javob yo'q";
        let html = '<div class="ans-container">';
        let lines = text.split('\n');
        let inList = false;
        lines.forEach(line => {
            let trimmedLine = line.trim();
            if (!trimmedLine) return;
            if (trimmedLine.endsWith(':')) {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<span class="ans-header">${trimmedLine}</span>`;
            } 
            else if (trimmedLine.includes('=') && (trimmedLine.match(/[A-Z]/) || trimmedLine.includes('∆'))) {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<div class="ans-formula">${trimmedLine}</div>`;
            }
            else if (trimmedLine.startsWith('*') || trimmedLine.startsWith('-') || /^\d+\./.test(trimmedLine)) {
                if (!inList) { html += '<ul class="ans-list">'; inList = true; }
                let cleanLine = trimmedLine.replace(/^[*-\d.]+\s*/, '');
                html += `<li>${cleanLine}</li>`;
            }
            else if (trimmedLine.toLowerCase().includes('xulosa')) {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<div class="ans-summary"><b>Xulosa:</b> ${trimmedLine.replace(/.*xulosa:?/i, '').trim()}</div>`;
            }
            else {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<p>${trimmedLine}</p>`;
            }
        });
        if (inList) html += '</ul>';
        html += '</div>';
        return html;
    }

    // --- REAL EXAM WITH CANVAS ---
    let ticketPositions = [];

    function startExamTab(btn) {
        isExamMode = true;
        document.getElementById('study-tools-ui').style.display = 'none';
        document.getElementById('matrix').style.display = 'none';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card" style="text-align:center">
                <h2 style="color:var(--accent-color)">Stol ustidan bilet tanlang</h2>
                <canvas id="examCanvas"></canvas>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                    <button class="exam-btn exam-check-btn" onclick="initExamTable('fizika_savollari')">Fizika Savollari</button>
                    <button class="exam-btn exam-check-btn" onclick="initExamTable('Issiqlik_texnikasi')">Issiqlik Savollari</button>
                </div>
            </div>
        `;
        setTimeout(() => drawTable(), 100);
    }

    function drawTable() {
        const canvas = document.getElementById('examCanvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        ticketPositions = [];
        const rows = 3;
        const cols = 4;
        const w = 60, h = 40;

        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                const x = (canvas.width/(cols+1)) * (c+1) - w/2;
                const y = (canvas.height/(rows+1)) * (r+1) - h/2;
                const angle = (Math.random() - 0.5) * 0.5;
                ticketPositions.push({x, y, w, h, angle, id: (r*cols+c+1)});

                ctx.save();
                ctx.translate(x+w/2, y+h/2);
                ctx.rotate(angle);
                ctx.fillStyle = "#fff";
                ctx.shadowBlur = 5;
                ctx.shadowColor = "#000";
                ctx.fillRect(-w/2, -h/2, w, h);
                ctx.fillStyle = "#000";
                ctx.font = "bold 12px sans-serif";
                ctx.fillText(r*cols+c+1, -5, 5);
                ctx.restore();
            }
        }

        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            
            ticketPositions.forEach(p => {
                if(mx > p.x && mx < p.x + p.w && my > p.y && my < p.y + p.h) {
                    tg.HapticFeedback.impactOccurred('medium');
                    prepareExamFromPath();
                }
            });
        };
    }

    let selectedExamPath = 'fizika_savollari';
    function initExamTable(path) {
        selectedExamPath = path;
        drawTable();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function prepareExamFromPath() {
        db.ref(selectedExamPath).once('value', (snap) => {
            const data = snap.val();
            if(!data) return;
            const items = Object.values(data);
            examQuestions = [];
            let tempArr = [...items];
            for(let i=0; i<3; i++) {
                if(tempArr.length == 0) break;
                const rIdx = Math.floor(Math.random() * tempArr.length);
                examQuestions.push(tempArr.splice(rIdx, 1)[0]);
            }
            currentIndex = 0;
            examScores = [0,0,0];
            renderExamQuestion();
        });
    }

    function renderExamQuestion() {
        const q = examQuestions[currentIndex];
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card">
                <span class="q-id">BILET SAVOLI ${currentIndex + 1} / 3</span>
                <div class="q-text">${q.savol}</div>
                <textarea class="exam-input" id="userInput" placeholder="Javobni to'liq yozma shaklda kiriting..."></textarea>
                <div id="examResult" style="margin-top:20px; display:none"></div>
                
                <div class="exam-nav">
                    <button class="exam-btn exam-check-btn" id="checkBtn" onclick="calculateScore()">Tekshirish va Ball olish</button>
                    <button class="exam-btn exam-next-btn" style="display:none" id="nextExamBtn" onclick="nextExam()">Keyingi savol</button>
                </div>
            </div>
        `;
    }

    function calculateScore() {
        const userText = document.getElementById('userInput').value.trim();
        const originalText = examQuestions[currentIndex].javob;
        const resultDiv = document.getElementById('examResult');
        
        if(userText.length < 5) { alert("Javob juda qisqa!"); return; }

        // Ballni foizda hisoblash (Kalit so'zlar va matn o'xshashligi)
        const userWords = userText.toLowerCase().split(/\s+/);
        const originalWords = originalText.toLowerCase().split(/\s+/);
        
        let matchCount = 0;
        originalWords.forEach(word => {
            if(word.length > 3 && userWords.includes(word.replace(/[.,]/g,''))) matchCount++;
        });

        const wordMatchPercent = (matchCount / originalWords.length) * 100;
        const lengthRatio = Math.min(userText.length / originalText.length, 1) * 100;
        const finalPercent = (wordMatchPercent * 0.7) + (lengthRatio * 0.3);
        
        const score = (finalPercent / 10).toFixed(1);
        examScores[currentIndex] = parseFloat(score);

        resultDiv.style.display = 'block';
        document.getElementById('checkBtn').style.display = 'none';
        document.getElementById('nextExamBtn').style.display = 'block';

        let diffHtml = `<div class="score-display">${score} ball / 10.0</div>`;
        diffHtml += `<div class="ans-header">Taqqoslash:</div><div class="diff-text">`;

        originalWords.forEach((word, idx) => {
            if(userWords.includes(word.replace(/[.,]/g,''))) {
                diffHtml += `<span>${word} </span>`;
            } else {
                diffHtml += `<span class="diff-red">${word}</span> `;
            }
        });

        diffHtml += `</div><div class="ans-summary"><b>Asl javob:</b><br>${formatAnswer(originalText)}</div>`;
        resultDiv.innerHTML = diffHtml;
        tg.HapticFeedback.notificationOccurred('warning');
    }

    function nextExam() {
        if(currentIndex < examQuestions.length - 1) {
            currentIndex++;
            renderExamQuestion();
        } else {
            const total = examScores.reduce((a, b) => a + b, 0).toFixed(1);
            const status = total >= 18 ? "<span style='color:var(--success-color)'>O'TDI</span>" : "<span style='color:var(--danger-color)'>YIQILDI (Kamida 18 ball kerak)</span>";
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="card" style="text-align:center">
                    <h1 style="font-size:40px">${total}</h1>
                    <p>Umumiy to'plangan ball (30 dan)</p>
                    <div style="font-size:20px; font-weight:bold; margin:20px 0;">Natija: ${status}</div>
                    <button class="save-btn" style="background:var(--accent-color); color:#fff; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold" onclick="startExamTab(document.querySelector('.nav-btn:last-child'))">Qayta topshirish</button>
                </div>
            `;
        }
    }

    function setTag(type) {
        const q = filteredQuestions[currentIndex];
        if (!q) return;
        if (questionStates[q.uniqueKey] === type) {
            delete questionStates[q.uniqueKey];
        } else {
            questionStates[q.uniqueKey] = type;
        }
        saveStates();
        tg.HapticFeedback.notificationOccurred('success');
        setTimeout(() => {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                renderCurrent();
                renderMatrix();
            } else {
                alert("Bu ro'yxatdagi oxirgi savol edi.");
                renderCurrent();
            }
        }, 300);
    }

    function renderCurrent() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        if (filteredQuestions.length === 0) {
            app.innerHTML = `<div class="loader" style="font-size:12px;">Bu filtrda savollar mavjud emas.</div>`;
            return;
        }
        const q = filteredQuestions[currentIndex];
        const state = questionStates[q.uniqueKey] || '';
        const card = document.createElement('div');
        card.className = 'card';
        const hasImg = q.image && q.image.length > 20;
        card.innerHTML = `
            <span class="q-id">#SAVOL ${currentIndex + 1} / ${filteredQuestions.length} (ID: ${q.displayId})</span>
            <div class="q-text">${q.savol || "Matn yo'q"}</div>
            ${hasImg ? `<img src="${q.image}" class="q-image" style="display:block">` : ''}
            <div class="answer-wrapper">${formatAnswer(q.javob)}</div>
            <div class="tag-actions">
                <button class="tag-btn oson ${state === 'oson' ? 'active' : ''}" onclick="setTag('oson')">Yodladim</button>
                <button class="tag-btn qiyin ${state === 'qiyin' ? 'active' : ''}" onclick="setTag('qiyin')">Yodlamadim</button>
                <button class="tag-btn ready ${state === 'ready' ? 'active' : ''}" onclick="setTag('ready')">100% Tayyor</button>
            </div>
        `;
        app.appendChild(card);
        document.querySelector('.container').scrollTop = 0;
    }

    function resetLearned() {
        if(confirm("Diqqat! Barcha natijalarni tozalaysizmi?")) {
            questionStates = {};
            saveStates();
            applyFilter();
            tg.HapticFeedback.notificationOccurred('warning');
        }
    }

    loadQuestions('fizika_savollari');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            padding: 20px 20px 80px 20px; /* Navigatsiya uchun pastdan joy qoldirildi */
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: #202024;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
            border-bottom: 1px solid #29292e;
            padding-bottom: 16px;
        }

        header h1 {
            font-size: 24px;
            color: #00b37e;
        }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 10px;
        }

        .day-counter {
            background: #29292e;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            color: #fba94c;
            font-size: 14px;
            flex: 1;
            text-align: center;
        }

        .btn-rest-day {
            background: #29292e;
            color: #fba94c;
            border: 1px solid #fba94c;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            flex: 1;
        }

        .btn-rest-day.active {
            background: #fba94c;
            color: #121214;
        }

        .btn-rest-day:active {
            transform: scale(0.95);
        }

        .rest-notification {
            background: rgba(251, 169, 76, 0.1);
            border: 1px dashed #fba94c;
            color: #fba94c;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
        }

        /* Bo'limlar boshqaruvi */
        .app-section {
            display: none;
        }

        .app-section.active {
            display: block;
        }

        /* Mashqlar ro'yxati */
        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: opacity 0.3s ease;
        }

        .exercise-list.rest-mode {
            opacity: 0.4;
            pointer-events: none;
        }

        .exercise-card {
            background: #29292e;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .exercise-card.completed {
            border-color: #00b37e;
            background: #1c2e24;
        }

        .exercise-info h3 {
            font-size: 16px;
            color: #ffffff;
        }

        .exercise-info p {
            font-size: 13px;
            color: #fba94c;
            font-weight: 600;
            margin-top: 4px;
        }

        .exercise-card.completed .exercise-info h3 {
            text-decoration: line-through;
            color: #8d8d99;
        }

        .btn-check {
            background: #00b37e;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-check.done {
            background: #29292e;
            color: #00b37e;
            border: 1px solid #00b37e;
        }

        .btn-check:active {
            transform: scale(0.95);
        }

        /* Statistika bo'limi uslublari */
        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stats-box {
            background: #29292e;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #323238;
        }

        .stats-box h4 {
            font-size: 12px;
            color: #8d8d99;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .stats-box p {
            font-size: 20px;
            font-weight: bold;
            color: #00b37e;
        }

        .stats-box p.accent {
            color: #fba94c;
        }

        .stats-title {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stats-row {
            background: #29292e;
            padding: 14px 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-row span.name {
            color: #ffffff;
            font-weight: 500;
        }

        .stats-row span.count {
            background: #1c2e24;
            color: #00b37e;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Pastki Navigatsiya paneli */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: #202024;
            border-top: 1px solid #29292e;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.2);
            border-radius: 16px 16px 0 0;
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            color: #8d8d99;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 6px 20px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-item.active {
            color: #00b37e;
            background: #1c2e24;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 1-BO'LIM: ASOSIY MASHQLAR -->
    <div id="section-main" class="app-section active">
        <header>
            <h1>Workout Tracker</h1>
            <div class="header-status">
                <div class="day-counter" id="day-display">Mashq kuni: Yuklanmoqda...</div>
                <button class="btn-rest-day" id="rest-toggle-btn">Dam olish kuni</button>
            </div>
        </header>

        <div class="rest-notification" id="rest-notice">
            🛏 Bugun sizning dam olish kuningiz. Mushaklar tiklanmoqda, norma muzlatildi!
        </div>

        <div class="exercise-list" id="workout-list">
            <!-- Mashqlar shu yerga chiqadi -->
        </div>
    </div>

    <!-- 2-BO'LIM: STATISTIKA -->
    <div id="section-stats" class="app-section">
        <header>
            <h1>Umumiy Statistika</h1>
        </header>

        <div class="stats-summary">
            <div class="stats-box">
                <h4>O'tgan kunlar</h4>
                <p id="stats-total-days">0</p>
            </div>
            <div class="stats-box">
                <h4>Dam olish kunlari</h4>
                <p id="stats-rest-days" class="accent">0</p>
            </div>
        </div>

        <div class="stats-title">Bajarilgan mashqlar soni (kun hisobida)</div>
        <div class="stats-list" id="exercises-stats-list">
            <!-- Mashqlar statistikasi shu yerga chiqadi -->
        </div>
    </div>
</div>

<!-- Pastki Navigatsiya paneli -->
<nav class="bottom-nav">
    <button class="nav-item active" id="nav-main">Asosiy</button>
    <button class="nav-item" id="nav-stats">Statistika</button>
</nav>

<!-- Firebase modullari -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
    import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Firebase sozlamalari
    const firebaseConfig = {
      apiKey: "AIzaSyA6ky38ZKegqZySQDOA57AA2cc2OWATnhY",
      authDomain: "tirnirofka-d020e.firebaseapp.com",
      projectId: "tirnirofka-d020e",
      storageBucket: "tirnirofka-d020e.firebasestorage.app",
      messagingSenderId: "377605946412",
      appId: "1:377605946412:web:6e22a9e3381d53404c2589",
      measurementId: "G-M4B3LNFQ1V",
      databaseURL: "https://tirnirofka-d020e-default-rtdb.firebaseio.com"
    };

    // Firebase-ni ishga tushirish
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    // 📅 Loyiha boshlangan sana (2026-yil, Iyul 2-sana)
    const startDate = new Date(2026, 6, 2); 
    const todayStr = new Date().toISOString().split('T')[0];

    let currentDay = 1;
    let countPerDay = 5;
    let isTodayRest = false;
    let totalDaysElapsed = 1;
    let totalRestDaysCount = 0;

    // Mashqlar identifikatorlari va nomlari
    const exercisesConfig = [
        { id: "turnik", name: "1. Turnik" },
        { id: "anchimaniya", name: "2. Anchimaniya" },
        { id: "figura_anchimaniya", name: "3. Figura uchun anchimaniya" },
        { id: "boy_anchimaniya", name: "4. Bo'y o'stirish va Qomatni tik qilish uchun anchimaniya" },
        { id: "pres", name: "5. Pres" },
        { id: "gantel", name: "6. Gantel ko'tarish" }
    ];

    const listContainer = document.getElementById('workout-list');
    const restBtn = document.getElementById('rest-toggle-btn');
    const restNotice = document.getElementById('rest-notice');

    // Navigatsiya tugmalari va bo'limlar elementlari
    const navMain = document.getElementById('nav-main');
    const navStats = document.getElementById('nav-stats');
    const sectionMain = document.getElementById('section-main');
    const sectionStats = document.getElementById('section-stats');

    // Kunlarni va Dam olish kunlarini hisoblab chiquvchi asosiy funksiya
    async function calculateWorkoutMetrics() {
        const today = new Date();
        const differenceInTime = today.getTime() - startDate.getTime();
        totalDaysElapsed = Math.floor(differenceInTime / (1000 * 3600 * 24)) + 1;
        if (totalDaysElapsed < 1) totalDaysElapsed = 1;

        const dbRef = ref(db);
        totalRestDaysCount = 0;
        isTodayRest = false;

        try {
            const restDaysSnapshot = await get(child(dbRef, "restDays"));
            if (restDaysSnapshot.exists()) {
                const restDaysData = restDaysSnapshot.val();
                
                if (restDaysData[todayStr] === true) {
                    isTodayRest = true;
                }

                for (const date in restDaysData) {
                    if (restDaysData[date] === true && date <= todayStr && date >= startDate.toISOString().split('T')[0]) {
                        totalRestDaysCount++;
                    }
                }
            }
        } catch (error) {
            console.error("Dam olish kunlarini hisoblashda xatolik:", error);
        }

        const activeWorkoutDays = totalDaysElapsed - totalRestDaysCount;
        currentDay = activeWorkoutDays > 0 ? activeWorkoutDays : 1;
        countPerDay = currentDay * 5;

        document.getElementById('day-display').textContent = `Mashq kuni: ${currentDay}-kun`;
        
        if (isTodayRest) {
            restBtn.classList.add('active');
            restNotice.style.display = 'block';
            listContainer.classList.add('rest-mode');
        } else {
            restBtn.classList.remove('active');
            restNotice.style.display = 'none';
            listContainer.classList.remove('rest-mode');
        }
    }

    // Sahifani render qilish va holatni yuklash
    async function initApp() {
        await calculateWorkoutMetrics();
        listContainer.innerHTML = '';
        
        const baseExercises = [
            { id: "turnik", name: "1. Turnik", target: `${countPerDay} ta` },
            { id: "anchimaniya", name: "2. Anchimaniya", target: `${countPerDay} ta` },
            { id: "figura_anchimaniya", name: "3. Figura uchun anchimaniya", target: `${countPerDay} ta` },
            { id: "boy_anchimaniya", name: "4. Bo'y o'stirish va Qomatni tik qilish uchun anchimaniya", target: `${countPerDay} ta` },
            { id: "pres", name: "5. Pres", target: `${countPerDay} ta` },
            { id: "gantel", name: "6. Gantel ko'tarish", target: `${countPerDay} ta o'ng qo'l / ${countPerDay} ta chap qo'l` }
        ];

        const dbRef = ref(db);
        let completedData = {};

        try {
            const snapshot = await get(child(dbRef, `workouts/${todayStr}`));
            if (snapshot.exists()) {
                completedData = snapshot.val();
            }
        } catch (error) {
            console.error("Mashq ma'lumotlarini yuklashda xatolik:", error);
        }

        baseExercises.forEach(ex => {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            card.id = `card-${ex.id}`;

            const isDone = completedData[ex.id] || false;
            if (isDone) card.classList.add('completed');

            card.innerHTML = `
                <div class="exercise-info">
                    <h3>${ex.name}</h3>
                    <p>Norma: ${ex.target}</p>
                </div>
                <button class="btn-check ${isDone ? 'done' : ''}" id="btn-${ex.id}">${isDone ? '✓ Bajarildi' : 'Bajarildi'}</button>
            `;
            
            card.querySelector('button').addEventListener('click', () => toggleExercise(ex.id));
            listContainer.appendChild(card);
        });
    }

    // Realtime Database-ga mashq holatini yozish funksiyasi
    async function toggleExercise(id) {
        if (isTodayRest) return;

        const card = document.getElementById(`card-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        
        card.classList.toggle('completed');
        const isCompleted = card.classList.contains('completed');

        if (isCompleted) {
            btn.textContent = '✓ Bajarildi';
            btn.classList.add('done');
        } else {
            btn.textContent = 'Bajarildi';
            btn.classList.remove('done');
        }

        try {
            await set(ref(db, `workouts/${todayStr}/${id}`), isCompleted);
            console.log("Mashq holati saqlandi!");
        } catch (error) {
            console.error("Xatolik yuz berdi: ", error);
        }
    }

    // Statistika bo'limini yuklash va hisoblash funksiyasi
    async function loadStatistics() {
        document.getElementById('stats-total-days').textContent = totalDaysElapsed;
        document.getElementById('stats-rest-days').textContent = totalRestDaysCount;

        const dbRef = ref(db);
        const statsContainer = document.getElementById('exercises-stats-list');
        statsContainer.innerHTML = 'Yuklanmoqda...';

        // Har bir mashq uchun bajarilgan kunlar sonini hisoblaydigan obyekt
        let exercisesCounter = {
            turnik: 0,
            anchimaniya: 0,
            figura_anchimaniya: 0,
            boy_anchimaniya: 0,
            pres: 0,
            gantel: 0
        };

        try {
            const workoutsSnapshot = await get(child(dbRef, "workouts"));
            if (workoutsSnapshot.exists()) {
                const workoutsData = workoutsSnapshot.val();
                
                // Barcha kunlar bo'yicha aylanib chiqib, true bo'lganlarini sanaymiz
                for (const date in workoutsData) {
                    const dayExercises = workoutsData[date];
                    for (const exId in dayExercises) {
                        if (dayExercises[exId] === true && exercisesCounter.hasOwnProperty(exId)) {
                            exercisesCounter[exId]++;
                        }
                    }
                }
            }

            // Statistikani ekranga chiqarish
            statsContainer.innerHTML = '';
            exercisesConfig.forEach(ex => {
                const row = document.createElement('div');
                row.className = 'stats-row';
                row.innerHTML = `
                    <span class="name">${ex.name}</span>
                    <span class="count">${exercisesCounter[ex.id]} kun</span>
                `;
                statsContainer.appendChild(row);
            });

        } catch (error) {
            console.error("Statistikani yuklashda xatolik:", error);
            statsContainer.innerHTML = 'Xatolik yuz berdi.';
        }
    }

    // Dam olish kuni tugmasi bosilganda ishlaydigan hodisa
    restBtn.addEventListener('click', async () => {
        isTodayRest = !isTodayRest;

        try {
            await set(ref(db, `restDays/${todayStr}`), isTodayRest);
            console.log("Dam olish holati yangilandi!");
            initApp();
        } catch (error) {
            console.error("Dam olish holatini saqlashda xatolik:", error);
        }
    });

    // Navigatsiya hodisalari
    navMain.addEventListener('click', () => {
        navMain.classList.add('active');
        navStats.classList.remove('active');
        sectionMain.classList.add('active');
        sectionStats.classList.remove('active');
        initApp(); // Asosiy sahifaga qaytganda ma'lumotni yangilash
    });

    navStats.addEventListener('click', () => {
        navStats.classList.add('active');
        navMain.classList.remove('active');
        sectionStats.classList.add('active');
        sectionMain.classList.remove('active');
        loadStatistics(); // Statistika sahifasiga o'tganda hisob-kitobni yangilash
    });

    // Ilovani ilk bor ishga tushirish
    initApp();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Prep Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        /* Modern Minimalist OLED Design */
        :root {
            --bg-color: #000000;
            --secondary-bg: #0a0a0a;
            --card-bg: #111111;
            --text-color: #ffffff;
            --hint-color: #888888;
            --accent-color: #0088cc;
            --success-color: #00c853;
            --danger-color: #ff3d00;
            --learned-color: #9b59b6;
            --border-color: #1a1a1a;
            --glass-bg: rgba(20, 20, 20, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            overflow: hidden;
            letter-spacing: -0.02em;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Full Screen Loading Overlay */
        #main-loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 136, 204, 0.1);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: 700;
            color: var(--text-color);
            padding-left: 10px;
        }

        .stats-badge {
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .reset-all-btn {
            background: none;
            border: 1px solid #333;
            color: #ff4444;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
        }

        /* Dashboard Style Home */
        .dashboard {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .dash-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .dash-card:active { transform: scale(0.95); }
        .dash-card i { font-size: 32px; margin-bottom: 10px; }
        .dash-card span { font-weight: 700; font-size: 14px; color: #fff; }
        .dash-card small { color: var(--hint-color); font-size: 10px; margin-top: 5px; }

        /* Nav Tabs (Hidden on Home) */
        .nav-tabs {
            display: none;
            background: var(--secondary-bg);
            padding: 6px;
            margin: 10px 15px 5px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            gap: 4px;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--hint-color);
            padding: 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .nav-btn.active {
            background: #1a1a1a;
            color: var(--accent-color);
        }

        /* Matrix Container */
        .matrix-container {
            display: none;
            padding: 10px 15px;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .matrix-item {
            min-width: 35px;
            height: 35px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }

        .matrix-item.active { border-color: var(--accent-color); color: #fff; transform: scale(1.1); }
        .matrix-item.oson { background: var(--success-color); color: #fff; border: none; }
        .matrix-item.qiyin { background: var(--danger-color); color: #fff; border: none; }
        .matrix-item.ready { background: var(--learned-color); color: #fff; border: none; }

        /* Study Tools */
        .study-tools {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px 15px 10px;
            flex-shrink: 0;
        }

        .tool-btn {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            color: var(--hint-color);
            padding: 8px 5px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .tool-btn b { color: #fff; margin-left: 3px; }
        .tool-btn.active-filter { border-color: var(--accent-color); color: var(--accent-color); background: rgba(0, 136, 204, 0.05); }

        /* Main Container */
        .container {
            padding: 5px 20px;
            max-width: 600px;
            margin: 0 auto;
            flex-grow: 1;
            overflow-y: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        /* Card */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
            margin-bottom: 20px;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .q-id { color: var(--accent-color); font-weight: 800; font-size: 12px; margin-bottom: 8px; display: block; }
        .q-text { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 20px; color: #ffffff; }
        .q-image, .ans-image { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); display: block; max-height: 220px; object-fit: contain; background: #111; }

        /* Answer Formatting */
        .ans-container { color: #e0e0e0; font-size: 15px; line-height: 1.6; }
        .ans-header { font-weight: 700; color: #ffffff; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 16px; border-left: 3px solid var(--accent-color); padding-left: 10px; }
        .ans-formula { background: #1a1a1a; padding: 12px; border-radius: 8px; margin: 10px 0; font-family: 'Courier New', Courier, monospace; color: #00ff00; font-size: 18px; text-align: center; border: 1px dashed #333; }
        .ans-list { margin: 5px 0; padding-left: 20px; list-style-type: disc; }
        .ans-list li { margin-bottom: 8px; }
        .ans-summary { background: rgba(0, 136, 204, 0.1); padding: 12px; border-radius: 10px; margin-top: 20px; border: 1px solid rgba(0, 136, 204, 0.2); }
        .ans-summary b { color: var(--accent-color); }

        /* Tag Actions */
        .tag-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 25px; }
        .tag-btn { padding: 14px 2px; border-radius: 12px; border: 1px solid #222; font-size: 10px; font-weight: 700; background: #050505; color: #fff; transition: 0.2s; text-transform: uppercase; }
        .tag-btn.oson.active { background: var(--success-color); border-color: var(--success-color); }
        .tag-btn.qiyin.active { background: var(--danger-color); border-color: var(--danger-color); }
        .tag-btn.ready.active { background: var(--learned-color); border-color: var(--learned-color); }

        /* Real Exam Styles */
        .exam-input { width: 100%; background: #fdfdfd; border: 1px solid #ccc; border-radius: 8px; color: #000; padding: 12px; font-family: 'Courier New', Courier, monospace; font-size: 14px; min-height: 80px; margin-top: 10px; resize: none; }
        .real-bilet { background: #fff; color: #000; padding: 30px; border-radius: 2px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #ddd; position: relative; }
        .bilet-header { text-align: center; border-bottom: 2px double #000; margin-bottom: 20px; padding-bottom: 10px; }
        .bilet-savol-title { font-weight: bold; margin-top: 15px; display: block; }
        .score-box { background: #f0f0f0; padding: 15px; border-radius: 10px; border-left: 5px solid var(--accent-color); margin-top: 10px; color: #000; }
        .exam-btn { background: var(--accent-color); border: none; color: #fff; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #examCanvas { background: #1a0f00; border-radius: 15px; box-shadow: inset 0 0 50px #000; width: 100%; height: 380px; cursor: pointer; }

        .loader { text-align: center; padding: 50px; color: var(--hint-color); width: 100%; }

        /* Fixed Details Bug */
        details.exam-ans-details { margin-top: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 5px; }
        details.exam-ans-details summary { cursor: pointer; font-weight: bold; color: #0088cc; padding: 5px; outline: none; }
        details.exam-ans-details .ans-container { color: #333 !important; padding: 10px; border-top: 1px solid #eee; }
        details.exam-ans-details .ans-header { color: #000 !important; }
        details.exam-ans-details .ans-formula { background: #f9f9f9; border-color: #ccc; color: #006600; }

        #captureArea { position: absolute; left: -9999px; top: 0; width: 400px; background: white; color: black; padding: 20px; font-family: serif; }
        
        .export-card { text-align: center; padding: 20px; }
        .export-btn { background: #2c3e50; color: white; border: 1px solid #34495e; padding: 15px; border-radius: 12px; margin: 10px 0; width: 100%; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .export-btn.pdf { background: #e74c3c; }
        .export-btn.docx { background: #2980b9; }

        /* Home Button in Header */
        .home-btn { background: none; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 8px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-msg">Yuklanmoqda...</div>
</div>

<div class="header">
    <button class="home-btn" onclick="showHome()">🏠</button>
    <h1>Exam Prep Pro</h1>
    <div class="stats-badge" id="totalPercent">0%</div>
</div>

<div class="nav-tabs" id="nav-tabs">
    <button class="nav-btn" id="tab-fizika" onclick="changeTab(this, 'fizika_savollari')">Fizika</button>
    <button class="nav-btn" id="tab-issiqlik" onclick="changeTab(this, 'Issiqlik_texnikasi')">Issiqlik</button>
    <button class="nav-btn" id="tab-exam" onclick="startExamTab(this)">🔥 Imtihon</button>
    <button class="nav-btn" id="tab-export" onclick="showExportTab(this)">📤 Export</button>
</div>

<div class="matrix-container" id="matrix"></div>

<div class="study-tools" id="study-tools-ui">
    <button class="tool-btn active-filter" id="filterAll" onclick="toggleFilter('all')">👁 Hammasi <b id="cntAll">0</b></button>
    <button class="tool-btn" id="filterOson" onclick="toggleFilter('oson')">✅ Yodladim <b id="cntOson">0</b></button>
    <button class="tool-btn" id="filterQiyin" onclick="toggleFilter('qiyin')">❌ Yodlamadim <b id="cntQiyin">0</b></button>
    <button class="tool-btn" id="filterReady" onclick="toggleFilter('ready')">⭐ 100% Tayyor <b id="cntReady">0</b></button>
</div>

<div class="container" id="app">
    </div>

<div id="captureArea"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = '8526492412:AAHNlolWab-ilGKs3Aw0KUHjVkK8NASm5_o';
    const CURRENT_CHAT_ID = tg.initDataUnsafe?.user?.id || '8533456947';

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        databaseURL: "https://songlyrics-a5df9-default-rtdb.firebaseio.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8",
        measurementId: "G-7DJQEVW067"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allQuestions = [];
    let filteredQuestions = [];
    let currentIndex = 0;
    let currentFilter = 'all'; 
    let currentPath = '';
    let isExamMode = false;
    let examQuestions = [];
    let selectedExamPath = '';

    let questionStates = JSON.parse(localStorage.getItem('exam_states_v3')) || {};

    window.addEventListener('DOMContentLoaded', () => {
        showHome();
        updateCounts();
    });

    function showHome() {
        isExamMode = false;
        document.getElementById('nav-tabs').style.display = 'none';
        document.getElementById('study-tools-ui').style.display = 'none';
        document.getElementById('matrix').style.display = 'none';
        
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="dashboard">
                <div class="dash-card" onclick="openSection('fizika_savollari')">
                    <i>⚛️</i>
                    <span>Fizika Savollari</span>
                    <small>70 ta savol mavjud</small>
                </div>
                <div class="dash-card" onclick="openSection('Issiqlik_texnikasi')">
                    <i>🔥</i>
                    <span>Issiqlik Texnikasi</span>
                    <small>90 ta savol mavjud</small>
                </div>
                <div class="dash-card" onclick="openExamDashboard()">
                    <i>📝</i>
                    <span>Real Imtihon</span>
                    <small>Bilimingizni sinang</small>
                </div>
                <div class="dash-card" onclick="openExportDashboard()">
                    <i>📤</i>
                    <span>PDF/DOCX</span>
                    <small>Fayl ko'rinishida yuklash</small>
                </div>
                <div class="dash-card" style="grid-column: span 2; padding: 15px;" onclick="resetLearned()">
                    <span style="color:var(--danger-color)">🔄 Barcha natijalarni tozalash</span>
                </div>
            </div>
        `;
        tg.HapticFeedback.impactOccurred('light');
    }

    function openSection(path) {
        document.getElementById('nav-tabs').style.display = 'flex';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const btn = path === 'fizika_savollari' ? document.getElementById('tab-fizika') : document.getElementById('tab-issiqlik');
        btn.classList.add('active');
        currentPath = path;
        loadQuestions(path);
    }

    function openExamDashboard() {
        document.getElementById('nav-tabs').style.display = 'flex';
        startExamTab(document.getElementById('tab-exam'));
    }

    function openExportDashboard() {
        document.getElementById('nav-tabs').style.display = 'flex';
        showExportTab(document.getElementById('tab-export'));
    }

    function saveStates() {
        localStorage.setItem('exam_states_v3', JSON.stringify(questionStates));
        updateCounts();
        renderMatrix();
    }

    function updateCounts() {
        let oson = 0, qiyin = 0, ready = 0, total = 0;
        // Calculation logic across all categories if needed, for now current
        allQuestions.forEach(q => {
            const state = questionStates[q.uniqueKey];
            if(state === 'oson') oson++;
            if(state === 'qiyin') qiyin++;
            if(state === 'ready') ready++;
        });
        
        if(document.getElementById('cntAll')) document.getElementById('cntAll').innerText = allQuestions.length;
        if(document.getElementById('cntOson')) document.getElementById('cntOson').innerText = oson;
        if(document.getElementById('cntQiyin')) document.getElementById('cntQiyin').innerText = qiyin;
        if(document.getElementById('cntReady')) document.getElementById('cntReady').innerText = ready;

        const keys = Object.keys(questionStates);
        document.getElementById('totalPercent').innerText = keys.length > 0 ? Math.min(100, Math.round((keys.length / 160) * 100)) + '%' : '0%';
    }

    function renderMatrix() {
        const matrix = document.getElementById('matrix');
        if(!matrix || matrix.style.display === 'none') return;
        matrix.innerHTML = '';
        if(isExamMode) return; 

        allQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            const state = questionStates[q.uniqueKey] || '';
            div.className = `matrix-item ${state} ${currentIndex === idx && currentFilter === 'all' ? 'active' : ''}`;
            div.innerText = idx + 1;
            div.onclick = () => {
                if(currentFilter !== 'all') {
                    currentFilter = 'all';
                    applyFilter();
                }
                currentIndex = idx;
                renderCurrent();
                tg.HapticFeedback.impactOccurred('light');
            };
            matrix.appendChild(div);
        });

        const activeItem = matrix.children[currentIndex];
        if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    function changeTab(btn, path) {
        isExamMode = false;
        document.getElementById('study-tools-ui').style.display = 'grid';
        document.getElementById('matrix').style.display = 'flex';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPath = path;
        currentFilter = 'all';
        loadQuestions(path);
        tg.HapticFeedback.impactOccurred('light');
    }

    function loadQuestions(path) {
        const app = document.getElementById('app');
        const overlay = document.getElementById('main-loading-overlay');
        overlay.style.display = 'flex';
        document.getElementById('loading-msg').innerText = "Savollar yuklanmoqda...";

        db.ref(path).once('value', (snap) => {
            const data = snap.val();
            overlay.style.display = 'none';

            if (!data) {
                app.innerHTML = '<div class="loader">Ma\'lumot topilmadi</div>';
                return;
            }

            allQuestions = Object.keys(data).map(key => {
                const item = data[key];
                const numericId = item.id || parseInt(key.replace(/\D/g, '')) || 0;
                const uniqueKey = path + '_' + numericId;
                return { ...item, displayId: numericId, uniqueKey: uniqueKey };
            }).sort((a, b) => a.displayId - b.displayId);

            document.getElementById('study-tools-ui').style.display = 'grid';
            document.getElementById('matrix').style.display = 'flex';
            applyFilter();
        });
    }

    function applyFilter() {
        if (currentFilter === 'qiyin') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'qiyin');
        } else if (currentFilter === 'oson') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'oson');
        } else if (currentFilter === 'ready') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'ready');
        } else {
            filteredQuestions = [...allQuestions];
        }

        currentIndex = 0;
        renderCurrent();
        updateFilterUI();
        updateCounts();
        renderMatrix();
    }

    function toggleFilter(filter) {
        currentFilter = filter;
        applyFilter();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateFilterUI() {
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active-filter'));
        const btn = document.getElementById('filter' + currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1));
        if(btn) btn.classList.add('active-filter');
    }

    function formatAnswer(text) {
        if (!text) return "Javob yo'q";
        if (text.startsWith('data:image') || text.startsWith('http')) {
            return `<div class="ans-container"><img src="${text}" class="ans-image" alt="Javob rasmi"></div>`;
        }
        let html = '<div class="ans-container">';
        let lines = text.split('\n');
        let inList = false;
        lines.forEach(line => {
            let trimmedLine = line.trim();
            if (!trimmedLine) return;
            if (trimmedLine.endsWith(':')) {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<span class="ans-header">${trimmedLine}</span>`;
            } 
            else if (trimmedLine.includes('=') && (trimmedLine.match(/[A-Z]/) || trimmedLine.includes('∆'))) {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<div class="ans-formula">${trimmedLine}</div>`;
            }
            else if (trimmedLine.startsWith('*') || trimmedLine.startsWith('-') || /^\d+\./.test(trimmedLine)) {
                if (!inList) { html += '<ul class="ans-list">'; inList = true; }
                html += `<li>${trimmedLine.replace(/^[*-\d.]+\s*/, '')}</li>`;
            }
            else {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<p>${trimmedLine}</p>`;
            }
        });
        if (inList) html += '</ul>';
        return html + '</div>';
    }

    function startExamTab(btn) {
        isExamMode = true;
        document.getElementById('study-tools-ui').style.display = 'none';
        document.getElementById('matrix').style.display = 'none';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="card" style="text-align:center">
                <h2 style="color:var(--accent-color)">Fan yo'nalishini tanlang</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                    <button class="exam-btn" onclick="initExamTable('fizika_savollari', 70)">Fizika (70 savol)</button>
                    <button class="exam-btn" onclick="initExamTable('Issiqlik_texnikasi', 90)">Issiqlik (90 savol)</button>
                </div>
                <canvas id="examCanvas"></canvas>
            </div>
        `;
    }

    function initExamTable(path, count) {
        const canvas = document.getElementById('examCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        selectedExamPath = path;
        const biletCount = Math.floor(count / 3);
        ticketPositions = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cols = 5;
        const rows = Math.ceil(biletCount / cols);
        const w = 45, h = 30;
        for(let i=0; i<biletCount; i++) {
            const r = Math.floor(i / cols);
            const c = i % cols;
            const x = (canvas.width/(cols+1)) * (c+1) - w/2;
            const y = (canvas.height/(rows+1)) * (r+1) - h/2;
            ticketPositions.push({x, y, w, h, id: i+1});
            ctx.save();
            ctx.translate(x+w/2, y+h/2);
            ctx.rotate((Math.random()-0.5)*0.4);
            ctx.fillStyle = "#fff"; ctx.shadowBlur = 4; ctx.shadowColor = "#000"; ctx.fillRect(-w/2, -h/2, w, h);
            ctx.fillStyle = "#000"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center"; ctx.fillText(i+1, 0, 5);
            ctx.restore();
        }
        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            ticketPositions.forEach(p => {
                if(mx > p.x && mx < p.x + p.w && my > p.y && my < p.y + p.h) {
                    currentExamBiletNumber = p.id;
                    tg.HapticFeedback.impactOccurred('heavy');
                    generateBiletContent(path);
                }
            });
        };
    }

    function generateBiletContent(path) {
        db.ref(path).once('value', (snap) => {
            const items = Object.values(snap.val());
            examQuestions = [];
            let tempArr = [...items];
            for(let i=0; i<3; i++) examQuestions.push(tempArr.splice(Math.floor(Math.random() * tempArr.length), 1)[0]);
            renderPaperBilet();
        });
    }

    function renderPaperBilet() {
        document.getElementById('app').innerHTML = `
            <div class="real-bilet" id="biletPaper">
                <div class="bilet-header">
                    <h3>IMTIHON BILETI №${currentExamBiletNumber}</h3>
                    <small>Fan: ${selectedExamPath === 'fizika_savollari' ? 'Fizika' : 'Issiqlik texnikasi'}</small>
                </div>
                ${examQuestions.map((q, i) => `
                    <span class="bilet-savol-title">${i+1}-SAVOL:</span>
                    <p>${q.savol}</p>
                    <textarea class="exam-input" id="ans${i}" placeholder="Javobingizni kiriting..."></textarea>
                `).join('')}
                <div style="margin-top:30px;">
                    <button class="exam-btn" style="width:100%" id="finishExamBtn" onclick="evaluateBilet()">Tekshirish va Ball olish</button>
                </div>
            </div>
            <div id="examFinalResult" style="display:none"></div>
        `;
    }

    async function evaluateBilet() {
        const btn = document.getElementById('finishExamBtn');
        btn.disabled = true; btn.innerText = "Hisoblanmoqda...";
        let totalScore = 0;
        let detailsHtml = `<div class="card"><h2 style="text-align:center">Natija</h2>`;
        const cleanText = (t) => t.toLowerCase().replace(/[.:•\-*!?]/g, ' ').replace(/\s+/g, ' ').trim();

        for(let i=0; i<3; i++) {
            const userAns = document.getElementById(`ans${i}`).value.trim();
            const originalAns = examQuestions[i].javob;
            let score = 0;

            if(userAns.length > 5) {
                const uWords = cleanText(userAns).split(' ');
                const oWords = cleanText(originalAns).split(' ');
                let match = 0;
                const important = oWords.filter(w => w.length > 3);
                important.forEach(w => { if(uWords.includes(w)) match++; });
                const matchPerc = important.length > 0 ? (match / important.length) * 100 : 100;
                score = Math.min(10, parseFloat(((matchPerc * 0.8) + (Math.min(userAns.length/originalAns.length,1)*20))/10).toFixed(1));
            }
            totalScore += parseFloat(score);
            detailsHtml += `
                <div class="score-box">
                    <b>Savol ${i+1} (${score} ball):</b>
                    <details class="exam-ans-details"><summary>Asl javobni ko'rish</summary>${formatAnswer(originalAns)}</details>
                </div>`;
            
            // Send original answer to bot if it's an image
            if (originalAns && (originalAns.startsWith('data:') || originalAns.startsWith('http'))) {
                sendToBot('photo', originalAns, `Bilet №${currentExamBiletNumber}, Savol ${i+1} javobi.`);
            }
        }

        const passed = totalScore >= 18;
        const userName = tg.initDataUnsafe?.user?.first_name || "Talaba";
        
        detailsHtml += `<div style="text-align:center; margin-top:20px;"><h1 style="color:${passed?'green':'red'}">${totalScore.toFixed(1)} BALL</h1><button class="exam-btn" style="width:100%" onclick="showHome()">Tugallash</button></div></div>`;
        document.getElementById('biletPaper').style.display = 'none';
        const resDiv = document.getElementById('examFinalResult');
        resDiv.innerHTML = detailsHtml; resDiv.style.display = 'block';

        // Result Image Logic
        const captureArea = document.getElementById('captureArea');
        captureArea.innerHTML = `<div style="border:10px double ${passed?'#0088cc':'#ff3d00'}; padding:20px; text-align:center;"><h1>SERTIFIKAT</h1><p>Talaba: ${userName}</p><h2>BALL: ${totalScore.toFixed(1)}</h2></div>`;
        
        setTimeout(() => {
            html2canvas(captureArea).then(canvas => {
                sendToBot('photo', canvas.toDataURL("image/png"), `📊 Imtihon yakunlandi: ${totalScore.toFixed(1)} ball.`);
                tg.showAlert("✅ Natijangiz va kerakli rasmlar bot orqali yuborildi!");
            });
        }, 500);
    }

    function sendToBot(type, content, caption) {
        const formData = new FormData();
        formData.append('chat_id', CURRENT_CHAT_ID);
        formData.append('caption', caption);
        if(type === 'photo') {
            const blob = content.startsWith('data:') ? base64ToBlob(content.split(',')[1]) : content;
            formData.append('photo', blob, 'image.png');
        }
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/send${type.charAt(0).toUpperCase()+type.slice(1)}`, { method: 'POST', body: formData });
    }

    function base64ToBlob(b64) {
        const bin = atob(b64); const arr = [];
        for(let i=0; i<bin.length; i++) arr.push(bin.charCodeAt(i));
        return new Blob([new Uint8Array(arr)], {type: 'image/png'});
    }

    function showExportTab(btn) {
        isExamMode = true; 
        document.getElementById('study-tools-ui').style.display = 'none';
        document.getElementById('matrix').style.display = 'none';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('app').innerHTML = `
            <div class="card export-card">
                <h2 style="color:var(--accent-color)">Savollarni yuklash</h2>
                <button class="export-btn pdf" onclick="exportData('fizika_savollari', 'pdf')">Fizika PDF</button>
                <button class="export-btn docx" onclick="exportData('fizika_savollari', 'docx')">Fizika DOCX</button>
                <button class="export-btn pdf" onclick="exportData('Issiqlik_texnikasi', 'pdf')">Issiqlik PDF</button>
                <button class="export-btn docx" onclick="exportData('Issiqlik_texnikasi', 'docx')">Issiqlik DOCX</button>
            </div>
        `;
    }

    async function exportData(path, format) {
        tg.MainButton.showProgress();
        const snap = await db.ref(path).once('value');
        const items = Object.values(snap.val()).sort((a,b) => (a.id||0)-(b.id||0));
        let finalBlob;
        const fileName = `${path}.${format}`;

        if(format === 'pdf') {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            let y = 20; doc.text(path, 10, y); y += 10;
            items.forEach((item, i) => {
                if(y>270){doc.addPage(); y=20;}
                const qLines = doc.splitTextToSize(`${i+1}. ${item.savol}`, 180);
                doc.text(qLines, 10, y); y += (qLines.length * 7) + 5;
            });
            finalBlob = doc.output('blob');
            doc.save(fileName);
        } else {
            const doc = new docx.Document({ sections: [{ children: items.flatMap((it, i) => [new docx.Paragraph({text: `${i+1}. ${it.savol}`, bold: true}), new docx.Paragraph({text: `Javob: ${it.javob}`})]) }] });
            finalBlob = await docx.Packer.toBlob(doc);
            saveAs(finalBlob, fileName);
        }
        
        const fd = new FormData(); fd.append('chat_id', CURRENT_CHAT_ID); fd.append('document', finalBlob, fileName);
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: fd });
        tg.MainButton.hide();
        tg.showAlert("📁 Fayl bot orqali yuborildi!");
    }

    function setTag(type) {
        const q = filteredQuestions[currentIndex];
        if (!q) return;
        questionStates[q.uniqueKey] = (questionStates[q.uniqueKey] === type) ? null : type;
        saveStates();
        tg.HapticFeedback.notificationOccurred('success');
        setTimeout(() => { if (currentIndex < filteredQuestions.length - 1) { currentIndex++; renderCurrent(); renderMatrix(); } }, 200);
    }

    function renderCurrent() {
        const app = document.getElementById('app');
        if(!app) return;
        app.innerHTML = '';
        if (filteredQuestions.length === 0) { app.innerHTML = `<div class="loader">Savollar yo'q.</div>`; return; }
        const q = filteredQuestions[currentIndex];
        const state = questionStates[q.uniqueKey] || '';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <span class="q-id">#SAVOL ${currentIndex + 1} / ${filteredQuestions.length}</span>
            <div class="q-text">${q.savol || "Matn yo'q"}</div>
            ${q.image && q.image.length > 20 ? `<img src="${q.image}" class="q-image">` : ''}
            <div class="answer-wrapper">${formatAnswer(q.javob)}</div>
            <div class="tag-actions">
                <button class="tag-btn oson ${state === 'oson' ? 'active' : ''}" onclick="setTag('oson')">Yodladim</button>
                <button class="tag-btn qiyin ${state === 'qiyin' ? 'active' : ''}" onclick="setTag('qiyin')">Qiyin</button>
                <button class="tag-btn ready ${state === 'ready' ? 'active' : ''}" onclick="setTag('ready')">Tayyor</button>
            </div>
        `;
        app.appendChild(card);
        app.scrollTop = 0;
    }

    function resetLearned() {
        if(confirm("Barcha natijalarni tozalashni xohlaysizmi?")) {
            questionStates = {};
            localStorage.removeItem('exam_states_v3');
            updateCounts();
            tg.showAlert("✅ Barcha natijalar tozalandi.");
            showHome();
        }
    }
</script>

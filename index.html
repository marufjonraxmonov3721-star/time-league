<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Prep Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* Modern Minimalist OLED Design */
        :root {
            --bg-color: #000000;
            --secondary-bg: #0a0a0a;
            --card-bg: #111111;
            --text-color: #ffffff;
            --hint-color: #888888;
            --accent-color: #0088cc;
            --success-color: #00c853;
            --danger-color: #ff3d00;
            --learned-color: #9b59b6;
            --border-color: #1a1a1a;
            --glass-bg: rgba(20, 20, 20, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            overflow: hidden;
            letter-spacing: -0.02em;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: 700;
            color: var(--text-color);
            padding-left: 10px;
        }

        .reset-all-btn {
            background: none;
            border: 1px solid #333;
            color: #ff4444;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            margin-right: 10px;
        }

        /* Nav Tabs */
        .nav-tabs {
            display: flex;
            background: var(--secondary-bg);
            padding: 6px;
            margin: 10px 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            gap: 4px;
            flex-shrink: 0;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--hint-color);
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.25s ease;
        }

        .nav-btn.active {
            background: #1a1a1a;
            color: var(--accent-color);
        }

        /* Study Tools */
        .study-tools {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 15px 10px;
            flex-shrink: 0;
        }

        .tool-btn {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            color: var(--hint-color);
            padding: 8px 5px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .tool-btn b { color: #fff; margin-left: 3px; }

        .tool-btn.active-filter {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(0, 136, 204, 0.05);
        }

        /* Main Container */
        .container {
            padding: 5px 20px;
            max-width: 600px;
            margin: 0 auto;
            flex-grow: 1;
            overflow-y: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 110px;
        }

        /* Card */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
            margin-bottom: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .counter {
            font-size: 11px;
            color: var(--hint-color);
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        .q-id {
            color: var(--accent-color);
            font-weight: 800;
            font-size: 12px;
            margin-bottom: 8px;
            display: block;
        }

        .q-text {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 15px;
            color: #eeeeee;
        }

        .q-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            display: none;
            max-height: 220px;
            object-fit: contain;
        }

        /* Buttons */
        .show-ans-btn {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: var(--text-color);
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
        }

        .answer-content {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #0d1a12;
            border-radius: 12px;
            font-size: 14px;
            color: #b0b0b0;
            border-left: 4px solid var(--success-color);
        }

        /* Tag Actions - 3 buttons */
        .tag-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }

        .tag-btn {
            padding: 10px 2px;
            border-radius: 10px;
            border: 1px solid #222;
            font-size: 10px;
            font-weight: 800;
            background: #050505;
            color: #fff;
            transition: 0.2s;
        }

        .tag-btn.oson.active { background: var(--success-color); border-color: var(--success-color); }
        .tag-btn.qiyin.active { background: var(--danger-color); border-color: var(--danger-color); }
        .tag-btn.ready.active { background: var(--learned-color); border-color: var(--learned-color); }

        /* Navigation Controls */
        .navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px 25px 25px;
            gap: 20px;
            background: linear-gradient(to top, black 80%, transparent);
            z-index: 100;
        }

        .nav-control {
            flex: 1;
            padding: 15px;
            border-radius: 16px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: 800;
            font-size: 18px;
        }

        .nav-control:disabled {
            background: #1a1a1a;
            color: #444;
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: var(--hint-color);
            width: 100%;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Exam Prep Pro</h1>
    <button class="reset-all-btn" onclick="resetLearned()">🔄 Restart</button>
</div>

<div class="nav-tabs" id="nav-tabs">
    <button class="nav-btn active" data-path="fizika_savollari" onclick="changeTab(this, 'fizika_savollari')">Fizika</button>
    <button class="nav-btn" data-path="Issiqlik_texnikasi" onclick="changeTab(this, 'Issiqlik_texnikasi')">Issiqlik</button>
</div>

<div class="study-tools">
    <button class="tool-btn active-filter" id="filterAll" onclick="toggleFilter('all')">👁 Hammasi <b id="cntAll">0</b></button>
    <button class="tool-btn" id="filterOson" onclick="toggleFilter('oson')">😊 Osonlar <b id="cntOson">0</b></button>
    <button class="tool-btn" id="filterQiyin" onclick="toggleFilter('qiyin')">🔥 Qiyinlar <b id="cntQiyin">0</b></button>
    <button class="tool-btn" id="filterReady" onclick="toggleFilter('ready')">✅ Tayyor <b id="cntReady">0</b></button>
</div>

<div class="container" id="app">
    <div class="loader">Yuklanmoqda...</div>
</div>

<div class="navigation" id="nav-controls" style="display: none;">
    <button class="nav-control" id="prevBtn" onclick="prevQuestion()">⬅️</button>
    <button class="nav-control" id="nextBtn" onclick="nextQuestion()">➡️</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        databaseURL: "https://songlyrics-a5df9-default-rtdb.firebaseio.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8",
        measurementId: "G-7DJQEVW067"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allQuestions = [];
    let filteredQuestions = [];
    let currentIndex = 0;
    let currentFilter = 'all'; 
    let currentPath = 'fizika_savollari';

    let questionStates = JSON.parse(localStorage.getItem('exam_states_v3')) || {};

    function saveStates() {
        localStorage.setItem('exam_states_v3', JSON.stringify(questionStates));
        updateCounts();
    }

    function updateCounts() {
        let oson = 0, qiyin = 0, ready = 0;
        allQuestions.forEach(q => {
            const state = questionStates[q.uniqueKey];
            if(state === 'oson') oson++;
            if(state === 'qiyin') qiyin++;
            if(state === 'ready') ready++;
        });
        document.getElementById('cntAll').innerText = allQuestions.length;
        document.getElementById('cntOson').innerText = oson;
        document.getElementById('cntQiyin').innerText = qiyin;
        document.getElementById('cntReady').innerText = ready;
    }

    function changeTab(btn, path) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPath = path;
        currentFilter = 'all';
        loadQuestions(path);
        tg.HapticFeedback.impactOccurred('light');
    }

    function loadQuestions(path) {
        const app = document.getElementById('app');
        const nav = document.getElementById('nav-controls');
        app.innerHTML = '<div class="loader">Yuklanmoqda...</div>';
        nav.style.display = 'none';

        db.ref(path).once('value', (snap) => {
            const data = snap.val();
            if (!data) {
                app.innerHTML = '<div class="loader">Ma\'lumot topilmadi</div>';
                return;
            }

            allQuestions = Object.keys(data).map(key => {
                const item = data[key];
                const numericId = item.id || parseInt(key.replace(/\D/g, '')) || 0;
                const uniqueKey = path + '_' + numericId;
                return { ...item, displayId: numericId, uniqueKey: uniqueKey };
            }).sort((a, b) => a.displayId - b.displayId);

            applyFilter();
            nav.style.display = 'flex';
        });
    }

    function applyFilter() {
        if (currentFilter === 'qiyin') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'qiyin');
        } else if (currentFilter === 'oson') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'oson');
        } else if (currentFilter === 'ready') {
            filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'ready');
        } else {
            filteredQuestions = [...allQuestions];
        }

        currentIndex = 0;
        renderCurrent();
        updateFilterUI();
        updateCounts();
    }

    function toggleFilter(filter) {
        currentFilter = filter;
        applyFilter();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateFilterUI() {
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active-filter'));
        document.getElementById('filter' + currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1)).classList.add('active-filter');
    }

    function setTag(type) {
        const q = filteredQuestions[currentIndex];
        if (!q) return;

        if (questionStates[q.uniqueKey] === type) {
            delete questionStates[q.uniqueKey];
        } else {
            questionStates[q.uniqueKey] = type;
        }
        
        saveStates();
        renderCurrent();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function renderCurrent() {
        const app = document.getElementById('app');
        app.innerHTML = '';

        if (filteredQuestions.length === 0) {
            app.innerHTML = `<div class="loader" style="font-size:12px;">Bu filtrda savollar mavjud emas.</div>`;
            updateNavButtons();
            return;
        }

        const q = filteredQuestions[currentIndex];
        const state = questionStates[q.uniqueKey] || '';
        const card = document.createElement('div');
        card.className = 'card';
        
        const hasImg = q.image && q.image.length > 20;
        
        card.innerHTML = `
            <span class="counter">${currentIndex + 1} / ${filteredQuestions.length}</span>
            <span class="q-id">#ID ${q.displayId}</span>
            <div class="q-text">${q.savol || "Matn yo'q"}</div>
            ${hasImg ? `<img src="${q.image}" class="q-image" style="display:block">` : ''}
            <button class="show-ans-btn" onclick="toggleAns(this)">Javobni ko'rsatish</button>
            <div class="answer-content">${q.javob || "Javob yo'q"}</div>
            <div class="tag-actions">
                <button class="tag-btn oson ${state === 'oson' ? 'active' : ''}" onclick="setTag('oson')">OSON</button>
                <button class="tag-btn qiyin ${state === 'qiyin' ? 'active' : ''}" onclick="setTag('qiyin')">QIYIN</button>
                <button class="tag-btn ready ${state === 'ready' ? 'active' : ''}" onclick="setTag('ready')">100% TAYYOR</button>
            </div>
        `;
        app.appendChild(card);
        document.querySelector('.container').scrollTop = 0;
        updateNavButtons();
    }

    function nextQuestion() {
        if (currentIndex < filteredQuestions.length - 1) {
            currentIndex++;
            renderCurrent();
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrent();
            tg.HapticFeedback.impactOccurred('light');
        }
    }

    function updateNavButtons() {
        document.getElementById('prevBtn').disabled = currentIndex === 0 || filteredQuestions.length === 0;
        document.getElementById('nextBtn').disabled = currentIndex === filteredQuestions.length - 1 || filteredQuestions.length === 0;
    }

    function toggleAns(btn) {
        const content = btn.nextElementSibling;
        if(content.style.display === 'block') {
            content.style.display = 'none';
            btn.innerText = 'Javobni ko\'rsatish';
        } else {
            content.style.display = 'block';
            btn.innerText = 'Yashirish';
            tg.HapticFeedback.notificationOccurred('success');
            setTimeout(() => {
                content.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }
    }

    function resetLearned() {
        if(confirm("Diqqat! Barcha belgilangan savollarni (Oson, Qiyin, Tayyor) tozalab yuborasizmi?")) {
            questionStates = {};
            saveStates();
            applyFilter();
            tg.HapticFeedback.notificationOccurred('warning');
        }
    }

    loadQuestions('fizika_savollari');
</script>
</body>
</html>

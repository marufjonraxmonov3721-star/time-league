<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Prep Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        /* Modern Minimalist OLED Design */
        :root {
            --bg-color: #000000;
            --secondary-bg: #0a0a0a;
            --card-bg: #111111;
            --text-color: #ffffff;
            --hint-color: #888888;
            --accent-color: #0088cc;
            --success-color: #00c853;
            --danger-color: #ff3d00;
            --learned-color: #9b59b6;
            --border-color: #1a1a1a;
            --glass-bg: rgba(20, 20, 20, 0.8);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            overflow: hidden;
            letter-spacing: -0.02em;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Dashboard Styles */
        #dashboard {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            overflow-y: auto;
            flex-grow: 1;
            align-content: start;
        }

        .dash-header {
            grid-column: span 2;
            padding: 20px 0;
            text-align: left;
        }

        .dash-header h2 { font-size: 28px; margin: 0; }
        .dash-header p { color: var(--hint-color); margin: 5px 0; font-size: 14px; }

        .menu-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .menu-card:active { transform: scale(0.95); background: #161616; }
        .menu-card .icon { font-size: 32px; }
        .menu-card .title { font-weight: 700; font-size: 15px; }
        .menu-card .subtitle { font-size: 11px; color: var(--hint-color); }

        /* Full Screen Loading Overlay */
        #main-loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none; /* Hidden by default now */
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 136, 204, 0.1);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            background-color: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: 700;
            color: var(--text-color);
        }

        .back-btn {
            background: none;
            border: 1px solid #333;
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            display: none;
        }

        .stats-badge {
            background: #1a1a1a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* Nav Tabs & Matrix (Hidden in Dashboard) */
        #study-ui-elements { display: none; }

        .nav-tabs {
            display: flex;
            background: var(--secondary-bg);
            padding: 6px;
            margin: 10px 15px 5px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            gap: 4px;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--hint-color);
            padding: 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .nav-btn.active {
            background: #1a1a1a;
            color: var(--accent-color);
        }

        .matrix-container {
            padding: 10px 15px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .matrix-item {
            min-width: 35px;
            height: 35px;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }

        .matrix-item.active { border-color: var(--accent-color); color: #fff; transform: scale(1.1); }
        .matrix-item.oson { background: var(--success-color); color: #fff; border: none; }
        .matrix-item.qiyin { background: var(--danger-color); color: #fff; border: none; }
        .matrix-item.ready { background: var(--learned-color); color: #fff; border: none; }

        .study-tools {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px 15px 10px;
            flex-shrink: 0;
        }

        .tool-btn {
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            color: var(--hint-color);
            padding: 8px 5px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-align: center;
        }

        .tool-btn b { color: #fff; margin-left: 3px; }
        .tool-btn.active-filter { border-color: var(--accent-color); color: var(--accent-color); background: rgba(0, 136, 204, 0.05); }

        .container {
            padding: 5px 20px;
            max-width: 600px;
            margin: 0 auto;
            flex-grow: 1;
            overflow-y: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.4s ease;
            margin-bottom: 20px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-id { color: var(--accent-color); font-weight: 800; font-size: 12px; margin-bottom: 8px; display: block; }
        .q-text { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 20px; color: #ffffff; }
        .q-image, .ans-image { width: 100%; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); display: block; max-height: 220px; object-fit: contain; background: #111; }

        .ans-container { color: #e0e0e0; font-size: 15px; line-height: 1.6; }
        .ans-header { font-weight: 700; color: #ffffff; display: block; margin-top: 15px; margin-bottom: 5px; font-size: 16px; border-left: 3px solid var(--accent-color); padding-left: 10px; }
        .ans-formula { background: #1a1a1a; padding: 12px; border-radius: 8px; margin: 10px 0; font-family: 'Courier New', Courier, monospace; color: #00ff00; font-size: 18px; text-align: center; border: 1px dashed #333; }
        .ans-list { margin: 5px 0; padding-left: 20px; list-style-type: disc; }
        .ans-list li { margin-bottom: 8px; }
        .ans-summary { background: rgba(0, 136, 204, 0.1); padding: 12px; border-radius: 10px; margin-top: 20px; border: 1px solid rgba(0, 136, 204, 0.2); }
        .ans-summary b { color: var(--accent-color); }

        .tag-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 25px; }
        .tag-btn { padding: 14px 2px; border-radius: 12px; border: 1px solid #222; font-size: 10px; font-weight: 700; background: #050505; color: #fff; transition: 0.2s; text-transform: uppercase; }
        .tag-btn.oson.active { background: var(--success-color); border-color: var(--success-color); }
        .tag-btn.qiyin.active { background: var(--danger-color); border-color: var(--danger-color); }
        .tag-btn.ready.active { background: var(--learned-color); border-color: var(--learned-color); }

        /* Exam & Paper Styles */
        .exam-input { width: 100%; background: #fdfdfd; border: 1px solid #ccc; border-radius: 8px; color: #000; padding: 12px; font-family: 'Courier New', Courier, monospace; font-size: 14px; min-height: 80px; margin-top: 10px; resize: none; }
        .real-bilet { background: #fff; color: #000; padding: 30px; border-radius: 2px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #ddd; }
        .bilet-header { text-align: center; border-bottom: 2px double #000; margin-bottom: 20px; padding-bottom: 10px; }
        .score-box { background: #f0f0f0; padding: 15px; border-radius: 10px; border-left: 5px solid var(--accent-color); margin-top: 10px; color: #000; }
        .exam-btn { background: var(--accent-color); border: none; color: #fff; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #examCanvas { background: #1a0f00; border-radius: 15px; box-shadow: inset 0 0 50px #000; width: 100%; height: 380px; cursor: pointer; }
        .loader { text-align: center; padding: 50px; color: var(--hint-color); width: 100%; }
        details.exam-ans-details { margin-top: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 5px; }
        details.exam-ans-details summary { cursor: pointer; font-weight: bold; color: #0088cc; padding: 5px; }
        #captureArea { position: absolute; left: -9999px; top: 0; width: 400px; background: white; color: black; padding: 20px; font-family: serif; }
        .export-card { text-align: center; padding: 20px; }
        .export-btn { background: #2c3e50; color: white; border: 1px solid #34495e; padding: 15px; border-radius: 12px; margin: 10px 0; width: 100%; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .export-btn.pdf { background: #e74c3c; }
        .export-btn.docx { background: #2980b9; }
    </style>
</head>
<body>

<div id="main-loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Yuklanmoqda...</div>
</div>

<div class="header">
    <button class="back-btn" id="backBtn" onclick="goToHome()">⬅ Orqaga</button>
    <h1 id="headerTitle">Exam Prep Pro</h1>
    <div class="stats-badge" id="totalPercent">0%</div>
</div>

<div id="dashboard">
    <div class="dash-header">
        <h2>Salom, 👋</h2>
        <p>Bugun qaysi bo'limni o'rganamiz?</p>
    </div>
    
    <div class="menu-card" onclick="selectSection('fizika_savollari')">
        <div class="icon">⚛️</div>
        <div class="title">Fizika</div>
        <div class="subtitle">70 ta savol</div>
    </div>
    
    <div class="menu-card" onclick="selectSection('Issiqlik_texnikasi')">
        <div class="icon">🔥</div>
        <div class="title">Issiqlik</div>
        <div class="subtitle">90 ta savol</div>
    </div>
    
    <div class="menu-card" onclick="selectSection('exam')">
        <div class="icon">🏆</div>
        <div class="title">Imtihon</div>
        <div class="subtitle">O'z bilimingni sinab ko'r</div>
    </div>
    
    <div class="menu-card" onclick="selectSection('export')">
        <div class="icon">📤</div>
        <div class="title">Export</div>
        <div class="subtitle">PDF/DOCX yuklash</div>
    </div>
</div>

<div id="study-ui-elements">
    <div class="nav-tabs" id="nav-tabs">
        <button class="nav-btn active" data-path="fizika_savollari" onclick="changeTab(this, 'fizika_savollari')">Fizika</button>
        <button class="nav-btn" data-path="Issiqlik_texnikasi" onclick="changeTab(this, 'Issiqlik_texnikasi')">Issiqlik</button>
        <button class="nav-btn" id="navExam" onclick="startExamTab(this)">🔥 Imtihon</button>
        <button class="nav-btn" id="navExport" onclick="showExportTab(this)">📤 Export</button>
    </div>

    <div class="matrix-container" id="matrix"></div>

    <div class="study-tools" id="study-tools-ui">
        <button class="tool-btn active-filter" id="filterAll" onclick="toggleFilter('all')">👁 Ham <b id="cntAll">0</b></button>
        <button class="tool-btn" id="filterOson" onclick="toggleFilter('oson')">✅ Yod <b id="cntOson">0</b></button>
        <button class="tool-btn" id="filterQiyin" onclick="toggleFilter('qiyin')">❌ Qiyin <b id="cntQiyin">0</b></button>
        <button class="tool-btn" id="filterReady" onclick="toggleFilter('ready')">⭐ Tayyor <b id="cntReady">0</b></button>
    </div>
</div>

<div class="container" id="app" style="display:none;"></div>

<div id="captureArea"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = '8526492412:AAHNlolWab-ilGKs3Aw0KUHjVkK8NASm5_o';
    const CURRENT_CHAT_ID = tg.initDataUnsafe?.user?.id || '8533456947';

    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        databaseURL: "https://songlyrics-a5df9-default-rtdb.firebaseio.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8",
        measurementId: "G-7DJQEVW067"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allQuestions = [];
    let filteredQuestions = [];
    let currentIndex = 0;
    let currentFilter = 'all'; 
    let currentPath = 'fizika_savollari';
    let isExamMode = false;
    let examQuestions = [];
    let selectedExamPath = '';

    let questionStates = JSON.parse(localStorage.getItem('exam_states_v3')) || {};

    // App Navigation Logic
    function goToHome() {
        document.getElementById('dashboard').style.display = 'grid';
        document.getElementById('study-ui-elements').style.display = 'none';
        document.getElementById('app').style.display = 'none';
        document.getElementById('backBtn').style.display = 'none';
        document.getElementById('headerTitle').innerText = "Exam Prep Pro";
        isExamMode = false;
    }

    function selectSection(type) {
        tg.HapticFeedback.impactOccurred('medium');
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('study-ui-elements').style.display = 'block';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('backBtn').style.display = 'block';
        
        const navBtns = document.querySelectorAll('.nav-btn');
        navBtns.forEach(b => b.classList.remove('active'));

        if(type === 'fizika_savollari' || type === 'Issiqlik_texnikasi') {
            const btn = document.querySelector(`.nav-btn[data-path="${type}"]`);
            changeTab(btn, type);
        } else if(type === 'exam') {
            startExamTab(document.getElementById('navExam'));
        } else if(type === 'export') {
            showExportTab(document.getElementById('navExport'));
        }
    }

    function saveStates() {
        localStorage.setItem('exam_states_v3', JSON.stringify(questionStates));
        updateCounts();
        renderMatrix();
    }

    function updateCounts() {
        let oson = 0, qiyin = 0, ready = 0;
        allQuestions.forEach(q => {
            const state = questionStates[q.uniqueKey];
            if(state === 'oson') oson++;
            if(state === 'qiyin') qiyin++;
            if(state === 'ready') ready++;
        });
        
        document.getElementById('cntAll').innerText = allQuestions.length;
        document.getElementById('cntOson').innerText = oson;
        document.getElementById('cntQiyin').innerText = qiyin;
        document.getElementById('cntReady').innerText = ready;

        const totalHandled = oson + qiyin + ready;
        const percent = allQuestions.length > 0 ? Math.round((totalHandled / allQuestions.length) * 100) : 0;
        document.getElementById('totalPercent').innerText = percent + '%';
    }

    function renderMatrix() {
        const matrix = document.getElementById('matrix');
        if(!matrix || matrix.style.display === 'none') return;
        matrix.innerHTML = '';
        if(isExamMode) return; 

        allQuestions.forEach((q, idx) => {
            const div = document.createElement('div');
            const state = questionStates[q.uniqueKey] || '';
            div.className = `matrix-item ${state} ${currentIndex === idx && currentFilter === 'all' ? 'active' : ''}`;
            div.innerText = idx + 1;
            div.onclick = () => {
                if(currentFilter !== 'all') { currentFilter = 'all'; applyFilter(); }
                currentIndex = idx;
                renderCurrent();
                tg.HapticFeedback.impactOccurred('light');
            };
            matrix.appendChild(div);
        });
    }

    function changeTab(btn, path) {
        isExamMode = false;
        document.getElementById('study-tools-ui').style.display = 'grid';
        document.getElementById('matrix').style.display = 'flex';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPath = path;
        currentFilter = 'all';
        loadQuestions(path);
    }

    function loadQuestions(path) {
        const overlay = document.getElementById('main-loading-overlay');
        overlay.style.display = 'flex';

        db.ref(path).once('value', (snap) => {
            const data = snap.val();
            overlay.style.display = 'none';

            if (!data) return;

            allQuestions = Object.keys(data).map(key => {
                const item = data[key];
                const numericId = item.id || parseInt(key.replace(/\D/g, '')) || 0;
                const uniqueKey = path + '_' + numericId;
                return { ...item, displayId: numericId, uniqueKey: uniqueKey };
            }).sort((a, b) => a.displayId - b.displayId);

            applyFilter();
        });
    }

    function applyFilter() {
        if (currentFilter === 'qiyin') filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'qiyin');
        else if (currentFilter === 'oson') filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'oson');
        else if (currentFilter === 'ready') filteredQuestions = allQuestions.filter(q => questionStates[q.uniqueKey] === 'ready');
        else filteredQuestions = [...allQuestions];

        currentIndex = 0;
        renderCurrent();
        updateFilterUI();
        updateCounts();
        renderMatrix();
    }

    function toggleFilter(filter) {
        currentFilter = filter;
        applyFilter();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateFilterUI() {
        document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active-filter'));
        document.getElementById('filter' + currentFilter.charAt(0).toUpperCase() + currentFilter.slice(1)).classList.add('active-filter');
    }

    function formatAnswer(text) {
        if (!text) return "Javob yo'q";
        if (text.startsWith('data:image') || text.startsWith('http')) return `<div class="ans-container"><img src="${text}" class="ans-image"></div>`;
        
        let html = '<div class="ans-container">';
        let lines = text.split('\n');
        let inList = false;
        lines.forEach(line => {
            let trimmedLine = line.trim();
            if (!trimmedLine) return;
            if (trimmedLine.endsWith(':')) {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<span class="ans-header">${trimmedLine}</span>`;
            } else if (trimmedLine.includes('=') && (trimmedLine.match(/[A-Z]/) || trimmedLine.includes('∆'))) {
                html += `<div class="ans-formula">${trimmedLine}</div>`;
            } else if (trimmedLine.startsWith('*') || trimmedLine.startsWith('-')) {
                if (!inList) { html += '<ul class="ans-list">'; inList = true; }
                html += `<li>${trimmedLine.substring(1).trim()}</li>`;
            } else {
                if (inList) { html += '</ul>'; inList = false; }
                html += `<p>${trimmedLine}</p>`;
            }
        });
        if (inList) html += '</ul>';
        return html + '</div>';
    }

    // Exam System
    let ticketPositions = [];
    function startExamTab(btn) {
        isExamMode = true;
        document.getElementById('study-tools-ui').style.display = 'none';
        document.getElementById('matrix').style.display = 'none';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById('app').innerHTML = `
            <div class="card" style="text-align:center">
                <h2 style="color:var(--accent-color)">Yo'nalishni tanlang</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
                    <button class="exam-btn" onclick="initExamTable('fizika_savollari', 70)">Fizika</button>
                    <button class="exam-btn" onclick="initExamTable('Issiqlik_texnikasi', 90)">Issiqlik</button>
                </div>
                <canvas id="examCanvas"></canvas>
            </div>
        `;
    }

    function initExamTable(path, count) {
        const canvas = document.getElementById('examCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        selectedExamPath = path;
        const biletCount = Math.floor(count / 3);
        ticketPositions = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cols = 5;
        const rows = Math.ceil(biletCount / cols);
        const w = 45, h = 30;

        for(let i=0; i<biletCount; i++) {
            const r = Math.floor(i / cols);
            const c = i % cols;
            const x = (canvas.width/(cols+1)) * (c+1) - w/2;
            const y = (canvas.height/(rows+1)) * (r+1) - h/2;
            ticketPositions.push({x, y, w, h, id: i+1});
            ctx.save();
            ctx.translate(x+w/2, y+h/2);
            ctx.rotate((Math.random()-0.5)*0.4);
            ctx.fillStyle = "#fff";
            ctx.fillRect(-w/2, -h/2, w, h);
            ctx.fillStyle = "#000";
            ctx.font = "bold 10px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(i+1, 0, 5);
            ctx.restore();
        }

        canvas.onclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left, my = e.clientY - rect.top;
            ticketPositions.forEach(p => {
                if(mx > p.x && mx < p.x + p.w && my > p.y && my < p.y + p.h) {
                    tg.HapticFeedback.impactOccurred('heavy');
                    generateBiletContent(selectedExamPath, p.id);
                }
            });
        };
    }

    function generateBiletContent(path, biletNo) {
        db.ref(path).once('value', (snap) => {
            const items = Object.values(snap.val());
            examQuestions = [];
            let temp = [...items];
            for(let i=0; i<3; i++) examQuestions.push(temp.splice(Math.floor(Math.random()*temp.length), 1)[0]);
            renderPaperBilet(biletNo);
        });
    }

    function renderPaperBilet(no) {
        document.getElementById('app').innerHTML = `
            <div class="real-bilet" id="biletPaper">
                <div class="bilet-header"><h3>BILET №${no}</h3></div>
                ${examQuestions.map((q, i) => `
                    <span class="bilet-savol-title">${i+1}-SAVOL:</span>
                    <p>${q.savol}</p>
                    <textarea class="exam-input" id="ans${i}" placeholder="Javobni kiriting..."></textarea>
                `).join('')}
                <button class="exam-btn" style="width:100%;margin-top:20px" onclick="evaluateBilet()">Tekshirish</button>
            </div>
            <div id="examFinalResult" style="display:none"></div>
        `;
    }

    async function evaluateBilet() {
        let totalScore = 0;
        let detailsHtml = `<div class="card"><h2 style="text-align:center">Natija</h2>`;
        for(let i=0; i<3; i++) {
            const userAns = document.getElementById(`ans${i}`).value.trim();
            const score = userAns.length > 10 ? (Math.random() * 3 + 7) : 0;
            totalScore += score;
            detailsHtml += `<div class="score-box"><b>Savol ${i+1}:</b> ${score.toFixed(1)} ball.</div>`;
        }
        detailsHtml += `<h1 style="text-align:center">${totalScore.toFixed(1)} BALL</h1><button class="exam-btn" style="width:100%" onclick="goToHome()">Yopish</button></div>`;
        document.getElementById('biletPaper').style.display = 'none';
        const resDiv = document.getElementById('examFinalResult');
        resDiv.innerHTML = detailsHtml;
        resDiv.style.display = 'block';
    }

    // Export System
    function showExportTab(btn) {
        isExamMode = true;
        document.getElementById('study-tools-ui').style.display = 'none';
        document.getElementById('matrix').style.display = 'none';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('app').innerHTML = `
            <div class="card export-card">
                <h2>Export</h2>
                <button class="export-btn pdf" onclick="exportData('fizika_savollari', 'pdf')">Fizika PDF</button>
                <button class="export-btn docx" onclick="exportData('Issiqlik_texnikasi', 'docx')">Issiqlik DOCX</button>
            </div>
        `;
    }

    async function exportData(path, format) {
        alert("Fayl tayyorlanmoqda, botga yuboriladi...");
        // Logic for export...
    }

    function setTag(type) {
        const q = filteredQuestions[currentIndex];
        if (!q) return;
        questionStates[q.uniqueKey] = (questionStates[q.uniqueKey] === type) ? null : type;
        saveStates();
        if (currentIndex < filteredQuestions.length - 1) { currentIndex++; renderCurrent(); }
        else renderCurrent();
    }

    function renderCurrent() {
        const app = document.getElementById('app');
        if (filteredQuestions.length === 0) { app.innerHTML = `<div class="loader">Savollar yo'q</div>`; return; }
        const q = filteredQuestions[currentIndex];
        const state = questionStates[q.uniqueKey] || '';
        app.innerHTML = `
            <div class="card">
                <span class="q-id">#SAVOL ${currentIndex + 1} / ${filteredQuestions.length}</span>
                <div class="q-text">${q.savol}</div>
                ${q.image ? `<img src="${q.image}" class="q-image">` : ''}
                ${formatAnswer(q.javob)}
                <div class="tag-actions">
                    <button class="tag-btn oson ${state === 'oson' ? 'active' : ''}" onclick="setTag('oson')">Yodladim</button>
                    <button class="tag-btn qiyin ${state === 'qiyin' ? 'active' : ''}" onclick="setTag('qiyin')">Qiyin</button>
                    <button class="tag-btn ready ${state === 'ready' ? 'active' : ''}" onclick="setTag('ready')">Tayyor</button>
                </div>
            </div>
        `;
    }

    // Initial State: Show Home
    window.onload = goToHome;
</script>

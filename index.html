<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exam Prep Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        /* Tim qora (OLED) dizayn */
        :root {
            --bg-color: #000000;
            --secondary-bg: #121212;
            --text-color: #ffffff;
            --hint-color: #aaaaaa;
            --accent-color: #0088cc; /* Telegram ko'k rangi */
            --success-color: #2ecc71;
            --card-border: #222222;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background-color: var(--secondary-bg);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 18px;
            margin: 0;
            color: var(--accent-color);
        }

        /* Fan tanlash tugmalari */
        .nav-tabs {
            display: flex;
            background: var(--secondary-bg);
            padding: 5px;
            gap: 5px;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--hint-color);
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: var(--bg-color);
            color: var(--accent-color);
            box-shadow: 0 0 10px rgba(0,136,204,0.2);
        }

        /* Yodlash rejimi paneli */
        .study-tools {
            display: flex;
            gap: 10px;
            padding: 10px 15px;
            background: #080808;
        }

        .tool-btn {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 8px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        /* Konteyner */
        .container {
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Savol kartochkasi */
        .card {
            background-color: var(--secondary-bg);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 20px;
            animation: slideUp 0.4s ease-out;
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-id {
            color: var(--accent-color);
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .q-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .q-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--card-border);
            display: none;
        }

        /* Javob tugmasi va qutisi */
        .show-ans-btn {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .learned-btn {
            margin-top: 10px;
            width: 100%;
            background: transparent;
            border: 1px solid #222;
            color: #555;
            padding: 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .answer-content {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background: rgba(46, 204, 113, 0.1);
            border-left: 3px solid var(--success-color);
            border-radius: 5px;
            font-size: 15px;
            color: #d1d1d1;
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: var(--hint-color);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>📚 Imtihon Bazasi</h1>
</div>

<div class="nav-tabs">
    <button class="nav-btn active" onclick="changeTab(this, 'fizika_savollari')">Fizika</button>
    <button class="nav-btn" onclick="changeTab(this, 'Issiqlik_texnikasi')">Issiqlik texnikasi</button>
</div>

<div class="study-tools">
    <button class="tool-btn" onclick="shuffleQuestions()">🔀 Aralashtirish</button>
    <button class="tool-btn" onclick="resetLearned()">🔄 Hammasini qaytarish</button>
</div>

<div class="container" id="app">
    <div class="loader">Yuklanmoqda...</div>
</div>

<script>
    // Telegram Web App init
    const tg = window.Telegram.WebApp;
    tg.expand(); // Ilovani to'liq ekranga ochish
    tg.MainButton.hide();

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDc9RDlt5PFtaL5Tpu0mv4Ctea9L0sPWac",
        authDomain: "songlyrics-a5df9.firebaseapp.com",
        databaseURL: "https://songlyrics-a5df9-default-rtdb.firebaseio.com",
        projectId: "songlyrics-a5df9",
        storageBucket: "songlyrics-a5df9.firebasestorage.app",
        messagingSenderId: "322622967401",
        appId: "1:322622967401:web:24569afce697e18edc9cf8",
        measurementId: "G-7DJQEVW067"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allQuestions = [];

    // Fan almashtirish
    function changeTab(btn, path) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadQuestions(path);
        // Telefon vibratsiyasi (Haptic Feedback)
        tg.HapticFeedback.impactOccurred('light');
    }

    // Ma'lumotlarni yuklash
    function loadQuestions(path) {
        const app = document.getElementById('app');
        app.innerHTML = '<div class="loader">Savollar yuklanmoqda...</div>';

        db.ref(path).once('value', (snap) => {
            const data = snap.val();
            if (!data) {
                app.innerHTML = '<div class="loader">Ma\'lumot topilmadi</div>';
                return;
            }

            allQuestions = Object.keys(data).map(k => ({...data[k]})).sort((a,b) => a.id - b.id);
            render(allQuestions);
        });
    }

    // Ekranga chiqarish
    function render(questions) {
        const app = document.getElementById('app');
        app.innerHTML = '';

        questions.forEach((q) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const hasImg = q.image && q.image.length > 20;
            
            card.innerHTML = `
                <span class="q-id">ID: ${q.id}</span>
                <div class="q-text">${q.savol}</div>
                ${hasImg ? `<img src="${q.image}" class="q-image" style="display:block">` : ''}
                <button class="show-ans-btn" onclick="toggleAns(this)">Javobni ko'rsatish</button>
                <div class="answer-content">${q.javob || "Javob rasmda ko'rsatilgan."}</div>
                <button class="learned-btn" onclick="markAsLearned(this)">✅ Yodladim (Yashirish)</button>
            `;
            app.appendChild(card);
        });
    }

    function toggleAns(btn) {
        const content = btn.nextElementSibling;
        if(content.style.display === 'block') {
            content.style.display = 'none';
            btn.innerText = 'Javobni ko\'rsatish';
        } else {
            content.style.display = 'block';
            btn.innerText = 'Yashirish';
            tg.HapticFeedback.notificationOccurred('success');
        }
    }

    // YODLASH REJIMI FUNKSIYALARI
    function shuffleQuestions() {
        allQuestions.sort(() => Math.random() - 0.5);
        render(allQuestions);
        tg.HapticFeedback.impactOccurred('medium');
    }

    function markAsLearned(btn) {
        const card = btn.parentElement;
        card.style.transition = "0.3s";
        card.style.opacity = "0";
        card.style.transform = "translateX(100px)";
        setTimeout(() => {
            card.style.display = "none";
        }, 300);
        tg.HapticFeedback.impactOccurred('light');
    }

    function resetLearned() {
        render(allQuestions);
        tg.HapticFeedback.notificationOccurred('warning');
    }

    // Birinchi yuklash
    loadQuestions('fizika_savollari');
</script>
</body>
</html>

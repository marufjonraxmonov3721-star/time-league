<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Google Sans', 'Roboto', 'Segoe UI', sans-serif;
        }

        :root {
            --md-primary: #4CAF82;
            --md-primary-dark: #2E7D52;
            --md-primary-container: #1B3D2A;
            --md-on-primary: #ffffff;
            --md-secondary: #FFB74D;
            --md-secondary-container: #3D2A00;
            --md-surface: #1A1C1E;
            --md-surface-1: #1E2124;
            --md-surface-2: #222629;
            --md-surface-3: #272B2F;
            --md-surface-variant: #2C3035;
            --md-outline: #3A3F44;
            --md-outline-variant: #303438;
            --md-on-surface: #E2E3E5;
            --md-on-surface-variant: #8C9198;
            --md-error: #F2788D;
            --md-error-container: #410E18;
            --md-on-error: #FFFFFF;
            --md-success: #4CAF82;
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 28px;
            --elevation-1: 0 1px 2px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.2);
            --elevation-2: 0 2px 4px rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.25);
            --elevation-3: 0 4px 8px rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.3);
        }

        body {
            background-color: var(--md-surface);
            color: var(--md-on-surface);
            padding: 0 0 90px 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 0;
        }

        /* ===== HEADER ===== */
        header {
            padding: 20px 20px 0 20px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #4CAF82 0%, #69D4A4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 10px;
        }

        .day-counter {
            background: linear-gradient(135deg, var(--md-primary-container), #1F3D2C);
            padding: 14px 18px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            color: #69D4A4;
            font-size: 15px;
            flex: 1;
            text-align: center;
            border: 1px solid rgba(76, 175, 130, 0.2);
            box-shadow: var(--elevation-1);
        }

        .rest-notification {
            background: linear-gradient(135deg, rgba(255, 183, 77, 0.12), rgba(255, 183, 77, 0.06));
            border: 1.5px solid rgba(255, 183, 77, 0.3);
            color: var(--md-secondary);
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            margin: 16px 20px 0;
            display: none;
            box-shadow: 0 2px 10px rgba(255, 183, 77, 0.1);
        }

        /* ===== SECTION CONTROL ===== */
        .app-section {
            display: none;
        }

        .app-section.active {
            display: block;
        }

        /* ===== EXERCISE LIST ===== */
        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 16px 20px 20px;
            transition: opacity 0.3s ease;
        }

        .exercise-list.rest-mode {
            opacity: 0.35;
            pointer-events: none;
        }

        .exercise-card {
            background: var(--md-surface-2);
            border: 1.5px solid var(--md-outline-variant);
            border-radius: var(--radius-lg);
            padding: 16px 16px 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--elevation-1);
            position: relative;
            overflow: hidden;
        }

        .exercise-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--md-outline-variant);
            border-radius: 4px 0 0 4px;
        }

        .exercise-card.completed {
            border-color: rgba(76, 175, 130, 0.4);
            background: linear-gradient(135deg, #1B2E23, #1E3328);
        }

        .exercise-card.completed::before {
            background: linear-gradient(180deg, #4CAF82, #2E7D52);
            width: 5px;
        }

        .exercise-info {
            flex: 1;
            padding-right: 8px;
        }

        .exercise-info h3 {
            font-size: 15px;
            font-weight: 500;
            color: var(--md-on-surface);
            line-height: 1.4;
        }

        .exercise-info p {
            font-size: 12px;
            color: var(--md-secondary);
            font-weight: 600;
            margin-top: 5px;
            background: rgba(255, 183, 77, 0.12);
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .exercise-card.completed .exercise-info h3 {
            text-decoration: line-through;
            color: var(--md-on-surface-variant);
        }

        .exercise-card.completed .exercise-info p {
            color: #4CAF82;
            background: rgba(76, 175, 130, 0.12);
        }

        .btn-check {
            background: linear-gradient(135deg, #4CAF82 0%, #2E9E6E 100%);
            color: #fff;
            border: none;
            padding: 11px 18px;
            border-radius: var(--radius-xl);
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            box-shadow: 0 3px 10px rgba(76, 175, 130, 0.35);
            white-space: nowrap;
        }

        .btn-check.done {
            background: var(--md-surface-variant);
            color: #4CAF82;
            border: 1.5px solid rgba(76, 175, 130, 0.4);
            box-shadow: none;
        }

        /* ===== RESET BUTTON STYLING ===== */
        .danger-zone {
            margin: 0 20px 16px;
            padding: 4px 0;
        }

        .btn-reset {
            width: 100%;
            background: linear-gradient(135deg, #E55C70 0%, #CC334B 100%);
            color: var(--md-on-primary);
            border: none;
            padding: 14px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(229, 92, 112, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-reset:active {
            transform: scale(0.98);
            box-shadow: 0 2px 6px rgba(229, 92, 112, 0.15);
        }

        /* ===== STATS SECTION ===== */
        .stats-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 20px 20px;
        }

        .stats-box {
            background: var(--md-surface-2);
            padding: 20px 16px;
            border-radius: var(--radius-lg);
            text-align: center;
            border: 1.5px solid var(--md-outline-variant);
            box-shadow: var(--elevation-1);
        }

        .stats-box h4 {
            font-size: 11px;
            color: var(--md-on-surface-variant);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.8px;
        }

        .stats-box p {
            font-size: 34px;
            font-weight: 700;
            color: #4CAF82;
        }

        .stats-box p.accent {
            color: var(--md-secondary);
        }

        .stats-title {
            font-size: 16px;
            color: var(--md-on-surface);
            margin: 0 20px 12px;
            font-weight: 600;
        }

        .stats-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0 20px 20px;
        }

        .stats-row {
            background: var(--md-surface-2);
            padding: 14px 18px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1.5px solid var(--md-outline-variant);
        }

        .stats-row span.name {
            color: var(--md-on-surface);
            font-weight: 500;
            font-size: 14px;
            padding-right: 10px;
            line-height: 1.3;
        }

        .stats-row span.count {
            background: linear-gradient(135deg, var(--md-primary-container), #1F3D2C);
            color: #69D4A4;
            padding: 5px 12px;
            border-radius: var(--radius-xl);
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
        }

        /* ===== KALENDAR BO'LIMI ===== */
        .calendar-container {
            background: var(--md-surface-2);
            border: 1.5px solid var(--md-outline-variant);
            border-radius: var(--radius-lg);
            margin: 16px 20px 20px;
            padding: 16px;
            box-shadow: var(--elevation-2);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .calendar-month-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--md-on-surface);
        }

        .calendar-nav-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-calendar-nav {
            background: var(--md-surface-3);
            border: 1.5px solid var(--md-outline-variant);
            color: var(--md-on-surface);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s ease;
        }

        .btn-calendar-nav:hover {
            background: var(--md-surface-variant);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            font-size: 11px;
            color: var(--md-on-surface-variant);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 500;
            border-radius: 50%;
            color: var(--md-on-surface-variant);
            background: transparent;
        }

        .calendar-day.active-month {
            color: var(--md-on-surface);
            background: var(--md-surface-3);
        }

        .calendar-day.completed {
            background: linear-gradient(135deg, #2E7D52 0%, #4CAF82 100%) !important;
            color: #ffffff !important;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(76, 175, 130, 0.4);
        }

        .calendar-day.rest {
            background: linear-gradient(135deg, #B8860B 0%, #FFB74D 100%) !important;
            color: #1A1200 !important;
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(255, 183, 77, 0.3);
        }

        .calendar-day.today {
            border: 2px solid #69D4A4;
        }

        .calendar-legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 12px 20px 0;
            font-size: 12px;
            color: var(--md-on-surface-variant);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-dot.completed { background: #4CAF82; }
        .legend-dot.rest { background: #FFB74D; }

        /* ===== BOTTOM NAVIGATION ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: rgba(26, 28, 30, 0.95);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--md-outline-variant);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 14px;
            box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--md-on-surface-variant);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 24px;
            border-radius: var(--radius-xl);
            position: relative;
        }

        .nav-item.active {
            color: #4CAF82;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
            background: rgba(76, 175, 130, 0.15);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .exercise-card, .stats-row, .calendar-container, .danger-zone {
            animation: slideUp 0.35s cubic-bezier(0.2, 0, 0, 1) both;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 1-BO'LIM: ASOSIY MASHQLAR -->
    <div id="section-main" class="app-section active">
        <header>
            <h1>Workout Tracker</h1>
            <div class="header-status">
                <div class="day-counter" id="day-display">Yuklanmoqda...</div>
            </div>
        </header>

        <div class="rest-notification" id="rest-notice">
            🛏 Ketma-ket 6 kunlik normani 100% bajardingiz! Bugun - Avtomatik Dam Olish Kuni.
        </div>

        <div class="exercise-list" id="workout-list"></div>
    </div>

    <!-- 2-BO'LIM: KALENDAR -->
    <div id="section-calendar" class="app-section">
        <header>
            <h1>Mashqlar Kalendari</h1>
        </header>
        
        <div class="calendar-container">
            <div class="calendar-header">
                <div class="calendar-month-title" id="calendar-month-year">Yuklanmoqda...</div>
                <div class="calendar-nav-buttons">
                    <button class="btn-calendar-nav" id="btn-prev-month">◀</button>
                    <button class="btn-calendar-nav" id="btn-next-month">▶</button>
                </div>
            </div>
            <div class="calendar-weekdays">
                <div>Du</div><div>Se</div><div>Ch</div><div>Pa</div><div>Ju</div><div>Sh</div><div>Ya</div>
            </div>
            <div class="calendar-days" id="calendar-days-grid"></div>
        </div>

        <div class="calendar-legend">
            <div class="legend-item">
                <div class="legend-dot completed"></div>
                <span>Bajarilgan kun</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot rest"></div>
                <span>Dam olish kuni</span>
            </div>
        </div>
    </div>

    <!-- 3-BO'LIM: STATISTIKA -->
    <div id="section-stats" class="app-section">
        <header>
            <h1>Umumiy Statistika</h1>
        </header>

        <div class="stats-summary">
            <div class="stats-box">
                <h4>Faol Mashq Kunlari</h4>
                <p id="stats-total-days">0</p>
            </div>
            <div class="stats-box">
                <h4>Dam Olish Kunlari</h4>
                <p id="stats-rest-days" class="accent">0</p>
            </div>
        </div>

        <!-- RESTART TUGMASI (DANGER ZONE) -->
        <div class="danger-zone">
            <button class="btn-reset" id="btn-app-reset">
                🔄 Tizimni Boshidan Boshlash
            </button>
        </div>

        <div class="stats-title">Bajarilgan jami mashqlar soni</div>
        <div class="stats-list" id="exercises-stats-list"></div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" id="nav-main">Asosiy</button>
    <button class="nav-item" id="nav-calendar">Kalendar</button>
    <button class="nav-item" id="nav-stats">Statistika</button>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6ky38ZKegqZySQDOA57AA2cc2OWATnhY",
      authDomain: "tirnirofka-d020e.firebaseapp.com",
      projectId: "tirnirofka-d020e",
      storageBucket: "tirnirofka-d020e.firebasestorage.app",
      messagingSenderId: "377605946412",
      appId: "1:377605946412:web:6e22a9e3381d53404c2589",
      databaseURL: "https://tirnirofka-d020e-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function getLocalDateString(date = new Date()) {
        return date.toLocaleDateString('sv');
    }

    let defaultStartDate = new Date(2026, 6, 2); 
    let startDate = defaultStartDate;
    const todayStr = getLocalDateString();

    let calendarViewDate = new Date(); 

    let currentDay = 1;      // Faol bajarilgan mashqlar kuni soni (Normani belgilaydi)
    let countPerDay = 5;     // joriy kunlik norma soni
    let isTodayRest = false; // Bugun dam olish kunimi?

    // Butun tarix xaritasi (Kalendar va statistika hisoblash uchun)
    let globalTimeline = {};

    const exercisesConfig = [
        { id: "anchimaniya", name: "1. Anchimaniya" },
        { id: "figura_anchimaniya", name: "2. Figura uchun anchimaniya" },
        { id: "boy_anchimaniya", name: "3. Bo'y o'stirish va Qomatni tik qilish uchun anchimaniya" },
        { id: "pres", name: "4. Pres" },
        { id: "gantel", name: "5. Gantel ko'tarish" }
    ];

    const listContainer = document.getElementById('workout-list');
    const restNotice = document.getElementById('rest-notice');

    const navMain = document.getElementById('nav-main');
    const navCalendar = document.getElementById('nav-calendar');
    const navStats = document.getElementById('nav-stats');
    
    const sectionMain = document.getElementById('section-main');
    const sectionCalendar = document.getElementById('section-calendar');
    const sectionStats = document.getElementById('section-stats');
    const btnAppReset = document.getElementById('btn-app-reset');
    
    const btnPrevMonth = document.getElementById('btn-prev-month');
    const btnNextMonth = document.getElementById('btn-next-month');

    async function syncStartDateFromDatabase() {
        const dbRef = ref(db);
        try {
            const snapshot = await get(child(dbRef, 'settings/startDate'));
            if (snapshot.exists()) {
                startDate = new Date(snapshot.val());
            } else {
                await set(ref(db, 'settings/startDate'), getLocalDateString(defaultStartDate));
                startDate = defaultStartDate;
            }
        } catch (error) {
            console.error("Sana yuklashda xatolik:", error);
            startDate = defaultStartDate;
        }
    }

    // Barcha kunlarni ketma-ketlikda tahlil qiluvchi asosiy mantiqiy funksiya
    async function buildTimelineMetrics() {
        await syncStartDateFromDatabase();
        
        const dbRef = ref(db);
        let workoutsData = {};
        try {
            const snapshot = await get(child(dbRef, "workouts"));
            if (snapshot.exists()) workoutsData = snapshot.val();
        } catch (e) {
            console.error("Ma'lumotlar yuklanishida xatolik:", e);
        }

        globalTimeline = {};
        
        let loopDate = new Date(startDate);
        const todayObj = new Date();
        todayObj.setHours(0,0,0,0);

        let activeDayCounter = 1; // 1-kundan boshlanadi
        let consecutiveStreak = 0; // Ketma-ket 100% bajarilgan kunlar streeki

        // Start sanasidan bugungacha (yoki kalendar doirasida kelgusi kunlar uchun ham) zanjir simulyatsiyasi
        // Hisoblash doirasi xatolik bermasligi uchun bugundan keyingi 40 kungacha hisoblaydi
        const maxDate = new Date();
        maxDate.setDate(maxDate.getDate() + 40);

        while (loopDate <= maxDate) {
            const loopDateStr = getLocalDateString(loopDate);
            
            // Agar ketma-ket 6 kun 100% bajarilgan bo'lsa -> Keyingi kun AVTOMATIK DAM OLISH
            if (consecutiveStreak === 6) {
                globalTimeline[loopDateStr] = {
                    type: 'rest',
                    dayNum: null,
                    norma: null,
                    completed: false
                };
                consecutiveStreak = 0; // Dam olishdan keyin joriy zanjir nolga tushadi
                loopDate.setDate(loopDate.getDate() + 1);
                continue;
            }

            // Oddiy mashq kuni holatini tekshirish
            const dayWorkouts = workoutsData[loopDateStr] || {};
            // 5 ta mashqdan barchasi true bo'lsagina kun 100% to'liq hisoblanadi
            const is100Percent = exercisesConfig.every(ex => dayWorkouts[ex.id] === true);

            globalTimeline[loopDateStr] = {
                type: 'workout',
                dayNum: activeDayCounter,
                norma: activeDayCounter * 5,
                completed: is100Percent,
                rawDetails: dayWorkouts
            };

            if (is100Percent) {
                consecutiveStreak++;
                activeDayCounter++; // Norma faqat muvaffaqiyatli to'liq kundan keyin o'sadi
            } else {
                // Agar bugun bo'lsa yoki hali to'ldirilmagan o'tgan kun bo'lsa streak uziladi
                if (loopDate < todayObj) {
                     consecutiveStreak = 0; 
                }
                // Bugun to'liq bajarilmagan bo'lsa ham norma to'liq kun hisoblanguncha joyida muzlab turadi
                // activeDayCounter o'zgarmaydi, ya'ni norma oshmaydi.
            }

            loopDate.setDate(loopDate.getDate() + 1);
        }

        // Bugungi joriy holat metrikalarini o'rnatamiz
        const todayTimeline = globalTimeline[todayStr];
        if (todayTimeline) {
            if (todayTimeline.type === 'rest') {
                isTodayRest = true;
                currentDay = null;
                countPerDay = null;
            } else {
                isTodayRest = false;
                currentDay = todayTimeline.dayNum;
                countPerDay = todayTimeline.norma;
            }
        }
    }

    async function initApp() {
        await buildTimelineMetrics();
        listContainer.innerHTML = '';

        if (isTodayRest) {
            document.getElementById('day-display').textContent = `Dam olish kuni`;
            restNotice.style.display = 'block';
            listContainer.classList.add('rest-mode');
            return;
        } else {
            document.getElementById('day-display').textContent = `Mashq kuni: ${currentDay}-kun`;
            restNotice.style.display = 'none';
            listContainer.classList.remove('rest-mode');
        }

        const baseExercises = [
            { id: "anchimaniya", name: "1. Anchimaniya", target: `${countPerDay} ta` },
            { id: "figura_anchimaniya", name: "2. Figura uchun anchimaniya", target: `${countPerDay} ta` },
            { id: "boy_anchimaniya", name: "3. Bo'y o'stirish va Qomatni tik qilish uchun anchimaniya", target: `${countPerDay} ta` },
            { id: "pres", name: "4. Pres", target: `${countPerDay} ta` },
            { id: "gantel", name: "5. Gantel ko'tarish", target: `${countPerDay} ta o'ng qo'l / ${countPerDay} ta chap qo'l` }
        ];

        const todayTimeline = globalTimeline[todayStr];
        const completedData = (todayTimeline && todayTimeline.rawDetails) ? todayTimeline.rawDetails : {};

        baseExercises.forEach(ex => {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            card.id = `card-${ex.id}`;

            const isDone = completedData[ex.id] || false;
            if (isDone) card.classList.add('completed');

            card.innerHTML = `
                <div class="exercise-info">
                    <h3>${ex.name}</h3>
                    <p>Norma: ${ex.target}</p>
                </div>
                <button class="btn-check ${isDone ? 'done' : ''}" id="btn-${ex.id}">${isDone ? '✓ Bajarildi' : 'Bajarildi'}</button>
            `;
            
            card.querySelector('button').addEventListener('click', () => toggleExercise(ex.id));
            listContainer.appendChild(card);
        });
    }

    async function toggleExercise(id) {
        if (isTodayRest) return;

        const card = document.getElementById(`card-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        card.classList.toggle('completed');
        const isCompleted = card.classList.contains('completed');

        if (isCompleted) {
            btn.textContent = '✓ Bajarildi';
            btn.classList.add('done');
        } else {
            btn.textContent = 'Bajarildi';
            btn.classList.remove('done');
        }

        try {
            await set(ref(db, `workouts/${todayStr}/${id}`), isCompleted);
            // Har bir element bosilganda umumiy vaqt chizig'i qayta hisoblanadi (dam olish kunini aniqlash uchun)
            await buildTimelineMetrics();
            if (isTodayRest) {
                initApp(); 
            }
        } catch (error) {
            console.error("Saqlashda xatolik: ", error);
        }
    }

    async function loadCalendar() {
        const gridContainer = document.getElementById('calendar-days-grid');
        gridContainer.innerHTML = '';

        await buildTimelineMetrics();

        const viewYear = calendarViewDate.getFullYear();
        const viewMonth = calendarViewDate.getMonth();

        const monthNames = ["Yanvar", "Fevral", "Mart", "Aprel", "May", "Iyun", "Iyul", "Avgust", "Sentabr", "Oktabr", "Noyabr", "Dekabr"];
        document.getElementById('calendar-month-year').textContent = `${monthNames[viewMonth]} ${viewYear}`;

        let firstDayIndex = new Date(viewYear, viewMonth, 1).getDay();
        firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
        const totalDaysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'calendar-day';
            gridContainer.appendChild(emptyDiv);
        }

        for (let day = 1; day <= totalDaysInMonth; day++) {
            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day active-month';
            dayDiv.textContent = day;

            const dateObj = new Date(viewYear, viewMonth, day);
            const dateStr = getLocalDateString(dateObj);

            if (dateStr === todayStr) {
                dayDiv.classList.add('today');
            }

            const dayMetrics = globalTimeline[dateStr];

            if (dateObj >= startDate || dateStr === getLocalDateString(startDate)) {
                if (dayMetrics) {
                    if (dayMetrics.type === 'rest') {
                        dayDiv.classList.add('rest');
                    } else if (dayMetrics.type === 'workout' && dayMetrics.completed) {
                        dayDiv.classList.add('completed');
                    }
                }
            } else {
                dayDiv.style.opacity = "0.2"; 
            }
            gridContainer.appendChild(dayDiv);
        }
    }

    async function loadStatistics() {
        await buildTimelineMetrics();

        let totalActiveCompletedDays = 0;
        let totalRestDaysCount = 0;
        let exercisesTotalCount = { anchimaniya: 0, figura_anchimaniya: 0, boy_anchimaniya: 0, pres: 0, gantel: 0 };

        const todayObj = new Date();
        todayObj.setHours(0,0,0,0);

        // Faqat o'tgan va joriy kungacha bo'lgan davr statistikasini hisoblaymiz
        for (const dateStr in globalTimeline) {
            const dateParts = dateStr.split('-');
            const checkDate = new Date(dateParts[0], dateParts[1] - 1, dateParts[2]);
            if (checkDate > todayObj) continue;

            const metric = globalTimeline[dateStr];
            if (metric.type === 'rest') {
                totalRestDaysCount++;
            } else if (metric.type === 'workout') {
                if (metric.completed) {
                    totalActiveCompletedDays++;
                }
                // Har bir alohida bajarilgan mashq element hajmini joriy kunga mos normada qo'shish
                const details = metric.rawDetails || {};
                for (const exId in details) {
                    if (details[exId] === true && exercisesTotalCount.hasOwnProperty(exId)) {
                        exercisesTotalCount[exId] += metric.norma;
                    }
                }
            }
        }

        document.getElementById('stats-total-days').textContent = totalActiveCompletedDays;
        document.getElementById('stats-rest-days').textContent = totalRestDaysCount;

        const statsContainer = document.getElementById('exercises-stats-list');
        statsContainer.innerHTML = '';

        exercisesConfig.forEach(ex => {
            const row = document.createElement('div');
            row.className = 'stats-row';
            let unitText = ex.id === "gantel" ? "ta o'ng / chap" : "ta";
            row.innerHTML = `<span class="name">${ex.name}</span><span class="count">${exercisesTotalCount[ex.id]} ${unitText}</span>`;
            statsContainer.appendChild(row);
        });
    }

    async function resetAppDatabase() {
        const confirmReset = confirm("Diqqat! Barcha kiritilgan mashqlar tarixlari butunlay o'chiriladi va hisoblagich bugundan boshlab 1-kunga qaytariladi. Ishonchingiz komilmi?");
        if (!confirmReset) return;

        try {
            await remove(ref(db, "workouts"));
            const currentTodayStr = getLocalDateString();
            await set(ref(db, 'settings/startDate'), currentTodayStr);
            
            alert("Tizim muvaffaqiyatli tozalandi! Mashqlar bugundan boshlab 1-kundan qayta boshlandi.");
            
            await buildTimelineMetrics();
            if (sectionMain.classList.contains('active')) {
                initApp();
            } else if (sectionCalendar.classList.contains('active')) {
                loadCalendar();
            } else if (sectionStats.classList.contains('active')) {
                loadStatistics();
            }
        } catch (error) {
            console.error("Tozalashda xatolik yuz berdi:", error);
            alert("Xatolik yuz berdi, iltimos qaytadan urinib ko'ring.");
        }
    }

    function switchSection(activeNavId, activeSectionId) {
        [navMain, navCalendar, navStats].forEach(btn => btn.classList.remove('active'));
        [sectionMain, sectionCalendar, sectionStats].forEach(sec => sec.classList.remove('active'));
        document.getElementById(activeNavId).classList.add('active');
        document.getElementById(activeSectionId).classList.add('active');
    }

    btnPrevMonth.addEventListener('click', () => {
        calendarViewDate.setMonth(calendarViewDate.getMonth() - 1);
        loadCalendar();
    });

    btnNextMonth.addEventListener('click', () => {
        calendarViewDate.setMonth(calendarViewDate.getMonth() + 1);
        loadCalendar();
    });

    navMain.addEventListener('click', () => { switchSection('nav-main', 'section-main'); initApp(); });
    navCalendar.addEventListener('click', async () => { switchSection('nav-calendar', 'section-calendar'); calendarViewDate = new Date(); await buildTimelineMetrics(); loadCalendar(); });
    navStats.addEventListener('click', async () => { switchSection('nav-stats', 'section-stats'); await buildTimelineMetrics(); loadStatistics(); });
    
    btnAppReset.addEventListener('click', resetAppDatabase);

    initApp();
</script>
</body>
</html>
